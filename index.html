<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Two Rooms and a Boom — Compagnon MJ</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1115">
<meta name="description" content="Application hors-ligne pour le Maître de Jeu : guide des personnages, répartition aléatoire des salles et minuteur de manches pour Two Rooms and a Boom (Édition Rouge).">
<style>
:root {
  --bg: #0f1115;
  --surface: #181b22;
  --surface-2: #20242e;
  --border: #2a2f3a;
  --text: #eef0f4;
  --muted: #97a0b3;
  --accent: #e8493a;
  --accent-2: #f2705f;
  --bleu: #3b82f6;
  --rouge: #ef4444;
  --gris: #9ca3af;
  --zombie: #22c55e;
  --violet: #8c3cf0;
  --room-a: #8b5cf6;
  --room-b: #f59e0b;
  --radius: 14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; min-width: 0; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior-y: contain;
}

#app {
  max-width: 640px;
  margin: 0 auto;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

header.top {
  padding: 16px 16px 10px;
  position: sticky; top: 0; z-index: 5;
  background: linear-gradient(180deg, rgba(15,17,21,0.98), rgba(15,17,21,0.85));
  backdrop-filter: blur(6px);
}
header.top h1 {
  font-size: 1.05rem;
  margin: 0;
  letter-spacing: 0.3px;
  color: var(--text);
}
header.top .subtitle {
  font-size: 0.78rem;
  color: var(--muted);
  margin-top: 2px;
}
.top-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.new-game-btn { flex-shrink: 0; }
.timer-badge {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; margin-top: 10px; padding: 8px 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white; border: none; border-radius: 10px;
  font-size: 0.9rem; font-weight: 700; font-variant-numeric: tabular-nums;
  cursor: pointer;
}
.timer-badge.paused { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }

main {
  flex: 1;
  padding: 8px 12px calc(90px + var(--safe-bottom));
  overflow-y: auto;
}

.view { display: none; }
.view.active { display: block; animation: fadein .15s ease; }
@keyframes fadein { from { opacity: 0 } to { opacity: 1 } }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin: 10px 0;
}
.card h2 {
  font-size: 1rem;
  margin: 0 0 12px;
  color: var(--text);
}
.card-head-row {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  margin-bottom: 12px;
}
.card-head-row h2 { margin: 0; }
.card h3 {
  font-size: 0.9rem;
  margin: 0 0 8px;
  color: var(--muted);
}

.muted { color: var(--muted); font-size: 0.85rem; }
.small-note { min-height: 1em; margin-top: 6px; }
.warning-text {
  color: #fbbf24;
  background: rgba(251, 191, 36, 0.08);
  border: 1px solid rgba(251, 191, 36, 0.25);
  border-radius: 10px;
  padding: 8px 10px;
  font-size: 0.82rem;
  margin: 8px 0;
}
.suggestion-text {
  color: #86efac;
  background: rgba(34, 197, 94, 0.08);
  border: 1px solid rgba(34, 197, 94, 0.25);
  border-radius: 10px;
  padding: 8px 10px;
  font-size: 0.82rem;
  margin: 8px 0;
}

.row-input {
  display: flex;
  gap: 8px;
}
.row-input.wrap { flex-wrap: wrap; }

.text-input {
  flex: 1;
  min-width: 0;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 10px;
  padding: 11px 12px;
  font-size: 0.95rem;
}
.text-input.small { max-width: 90px; flex: 0 0 90px; }
.text-input.tiny { max-width: 64px; flex: 0 0 64px; padding: 8px; }
.text-input:focus { outline: 2px solid var(--accent-2); }
select.text-input { -webkit-appearance: none; appearance: none; }

.btn {
  border: none;
  border-radius: 10px;
  padding: 11px 16px;
  font-size: 0.92rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:disabled { opacity: 0.4; }
.btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-ghost.danger { color: #f87171; border-color: rgba(248,113,113,0.35); }
.btn-sm { padding: 8px 12px; font-size: 0.8rem; }
.btn-start {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white;
  padding: 16px;
  font-size: 1.05rem;
  border-radius: 14px;
}

.quick-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

.player-list { margin-top: 10px; display: flex; flex-direction: row; flex-wrap: wrap; gap: 8px; }
.player-row {
  display: inline-flex; align-items: center; gap: 4px;
  background: rgba(232, 73, 58, 0.12); border: 1px solid rgba(232, 73, 58, 0.3);
  border-radius: 999px; padding: 7px 6px 7px 14px;
}
.player-name {
  font-size: 0.88rem; font-weight: 600; font-family: inherit; color: var(--text);
  background: transparent; border: none; outline: none; padding: 2px 0; min-width: 0;
}
.player-name:focus { text-decoration: underline; text-decoration-color: var(--accent-2); }
.icon-btn {
  background: transparent; border: none; color: var(--muted);
  font-size: 1rem; cursor: pointer; padding: 4px 8px;
}
.icon-btn:hover { color: #f87171; }

.link-btn {
  background: none; border: none; color: var(--accent-2); font-size: 0.78rem;
  cursor: pointer; text-decoration: underline; padding: 0;
}
.history-box { margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--border); }
.history-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.chosen-tag.history-tag {
  cursor: pointer; background: transparent; border: 1px dashed var(--muted); color: var(--muted);
}
.chosen-tag.history-tag:active { background: var(--surface-2); }

.two-cols { display: flex; gap: 10px; margin-top: 12px; }
.room-col { flex: 1 1 0; min-width: 0; border-radius: 12px; padding: 10px; background: var(--surface-2); border: 1px solid var(--border); }
.room-col h3 { margin: 0 0 8px; font-size: 0.85rem; }
.room-a h3 { color: var(--room-a); }
.room-b h3 { color: var(--room-b); }
.room-player { display: flex; align-items: center; justify-content: space-between; gap: 6px; padding: 6px 8px; border-radius: 8px; font-size: 0.88rem; margin-bottom: 4px; background: rgba(255,255,255,0.03); }
.room-player span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.room-player .icon-btn { padding: 2px 6px; font-size: 0.9rem; flex-shrink: 0; }
.room-label-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.room-label-input { min-width: 0; flex: 1; font-size: 0.85rem; font-weight: 700; padding: 6px 8px; }
.room-a .room-label-input { color: var(--room-a); }
.room-b .room-label-input { color: var(--room-b); }

.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.filter-chip {
  background: var(--surface-2); border: 1px solid var(--border); color: var(--muted);
  border-radius: 999px; padding: 7px 12px; font-size: 0.8rem; cursor: pointer;
}
.filter-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

.role-list {
  margin-top: 10px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px;
  align-content: start;
}
.role-row {
  position: relative;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 4px;
  text-align: center;
  background: var(--surface-2); border-radius: 10px; padding: 10px 8px 8px; cursor: pointer;
  border: 1px solid transparent; height: 150px;
}
.role-row.in-squad {
  background: rgba(232, 73, 58, 0.1);
  border-color: rgba(232, 73, 58, 0.35);
}
.role-row:active { opacity: 0.85; }
.role-row-text { min-width: 0; width: 100%; }
.role-row-name {
  font-size: 0.82rem; line-height: 1.2; font-weight: 600;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.role-row-hint {
  font-size: 0.66rem; line-height: 1.25; color: var(--muted); margin-top: 3px;
  display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
}
.role-check {
  position: absolute; top: 4px; right: 6px;
  color: var(--accent); font-size: 0.95rem; font-weight: 700;
}
.role-info-btn {
  position: absolute; top: 2px; left: 2px;
  flex: 0 0 auto; background: transparent; border: none;
  color: var(--muted); border-radius: 8px; padding: 5px 6px; font-size: 0.8rem;
  cursor: pointer;
}
.role-info-btn:active { color: var(--text); }

.endgame-line { font-size: 1.02rem; line-height: 1.5; padding: 8px 0; border-bottom: 1px dashed var(--border); }
.endgame-line:last-child { border-bottom: none; }

.role-stepper { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 2px; }
.role-step-btn {
  width: 22px; height: 22px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-size: 0.95rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; line-height: 1;
}
.role-step-btn:active { background: var(--accent); color: white; border-color: var(--accent); }
.role-step-btn:disabled { opacity: 0.35; cursor: default; }
.role-step-count { min-width: 16px; font-size: 0.85rem; font-weight: 700; text-align: center; }

.big-stepper { display: flex; align-items: center; gap: 10px; }
.big-step-btn {
  width: 42px; height: 42px; border-radius: 12px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-size: 1.4rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; line-height: 1;
  touch-action: manipulation;
}
.big-step-btn:active { background: var(--accent); color: white; border-color: var(--accent); }
.big-step-btn:disabled { opacity: 0.35; cursor: default; }
.big-step-value { min-width: 46px; text-align: center; font-size: 1.15rem; font-weight: 800; font-variant-numeric: tabular-nums; }
.stepper-field { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.stepper-field-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
.rounds-row .role-stepper { gap: 3px; }
.rounds-row .role-step-btn { width: 26px; height: 26px; }
.fill-gap-btn { margin-top: 8px; }

@media (min-width: 480px) {
  .role-list { grid-template-columns: repeat(3, 1fr); }
}

.dot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 10px; }
.dot-bleu { background: var(--bleu); }
.dot-rouge { background: var(--rouge); }
.dot-gris { background: var(--gris); }
.dot-zombie { background: var(--zombie); }
.dot-vert { background: var(--zombie); }
.dot-violet { background: var(--violet); }
.dot-mixte { background: linear-gradient(90deg, var(--bleu) 50%, var(--rouge) 50%); }

.quick-explain {
  font-size: 1.02rem; line-height: 1.5; padding: 4px 20px 6px;
  font-weight: 500;
}
.official-label {
  font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px;
  padding: 10px 20px 0; opacity: 0.7;
}
.official-desc.modal-desc {
  font-size: 0.78rem; line-height: 1.4; color: var(--muted); padding: 2px 20px 10px;
}
.detail-toggle {
  margin: 6px 20px 0;
}
.detail-toggle summary {
  cursor: pointer; color: var(--accent-2); font-size: 0.82rem;
  padding: 8px 0; list-style: none;
}
.detail-toggle summary::-webkit-details-marker { display: none; }
.detail-toggle summary::before { content: "📜 "; }
.detail-toggle[open] summary::before { content: "📜 "; }
.detail-toggle .modal-desc { padding: 4px 0 0; }

.balance-line { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.chip { border-radius: 999px; padding: 5px 11px; font-size: 0.82rem; background: var(--surface-2); }
.chosen-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
.chosen-tag {
  display: inline-flex; align-items: center; gap: 6px;
  border-radius: 999px; padding: 5px 6px 5px 12px; font-size: 0.8rem;
  background: var(--surface-2); border: 1px solid var(--border);
}
.chosen-tag.team-bleu { border-color: rgba(59,130,246,0.4); }
.chosen-tag.team-rouge { border-color: rgba(239,68,68,0.4); }
.chosen-tag.team-gris { border-color: rgba(156,163,175,0.4); }
.chosen-tag.team-zombie { border-color: rgba(34,197,94,0.4); }
.chosen-tag.team-mixte { border-image: linear-gradient(90deg, rgba(59,130,246,0.6), rgba(239,68,68,0.6)) 1; border-width: 1.5px; }
.chosen-rm { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 0.85rem; padding: 2px 4px; }
.chosen-tag.tappable { padding: 6px 14px; cursor: pointer; }
.chosen-tag.tappable:active { background: var(--surface); }

.glossary-box { display: flex; flex-direction: column; gap: 8px; background: rgba(255,255,255,0.03); border-radius: 10px; margin: 8px 20px 0; padding: 10px 12px; }
.glossary-title { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 2px; }
.glossary-line { font-size: 0.88rem; line-height: 1.4; }
.glossary-term { font-weight: 700; color: var(--accent-2); }
.glossary-def { color: var(--text); }

/* Onglet Explication — liste complète, sans clic requis */
.explain-row { padding: 10px 0; }
.explain-name-line { display: flex; align-items: center; gap: 8px; padding: 0 2px; }
.explain-name { font-size: 1rem; font-weight: 700; }
.explain-row .quick-explain { padding: 4px 2px 2px; }
.explain-row .official-desc.modal-desc { padding: 2px 2px 2px; }
.explain-sep { height: 1px; background: var(--border); margin: 6px 0 0; }

.roles-in-play { }

/* Confirm dialog (remplace window.confirm) */
.confirm-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 30; align-items: center; justify-content: center; padding: 24px;
}
.confirm-overlay.open { display: flex; }
.confirm-box {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 20px; max-width: 400px; width: 100%;
}
.confirm-message { font-size: 0.95rem; line-height: 1.5; white-space: pre-line; margin-bottom: 18px; }
.confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }
.confirm-actions .btn { flex: 1; }
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 20; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: var(--surface); width: 100%; max-width: 640px;
  border-radius: 18px 18px 0 0; max-height: 85dvh; overflow-y: auto;
  padding: 0 0 24px; position: relative;
}
.modal-close {
  position: sticky; top: 8px; float: right; margin-right: 10px;
  background: rgba(0,0,0,0.35); color: white; border: none; border-radius: 50%;
  width: 32px; height: 32px; font-size: 1rem; cursor: pointer; z-index: 2;
}
.modal-header { padding: 18px 20px 14px; border-radius: 18px 18px 0 0; }
.team-bg-bleu { background: linear-gradient(135deg, rgba(59,130,246,0.25), transparent); }
.team-bg-rouge { background: linear-gradient(135deg, rgba(239,68,68,0.25), transparent); }
.team-bg-gris { background: linear-gradient(135deg, rgba(156,163,175,0.2), transparent); }
.team-bg-zombie { background: linear-gradient(135deg, rgba(34,197,94,0.25), transparent); }
.team-bg-vert { background: linear-gradient(135deg, rgba(34,197,94,0.25), transparent); }
.team-bg-violet { background: linear-gradient(135deg, rgba(140,60,240,0.25), transparent); }
.team-bg-mixte { background: linear-gradient(135deg, rgba(59,130,246,0.22), rgba(239,68,68,0.22)); }
.modal-title { font-size: 1.3rem; font-weight: 700; }
.modal-subtitle { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }
.modal-team { font-size: 0.78rem; color: var(--muted); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-desc { padding: 4px 20px; font-size: 0.95rem; line-height: 1.5; }
.modal-desc p { margin: 0 0 10px; }
.tip { margin: 8px 20px; padding: 10px 12px; border-radius: 10px; font-size: 0.85rem; }
.tip-plus { background: rgba(34,197,94,0.1); color: #86efac; }
.tip-minus { background: rgba(239,68,68,0.1); color: #fca5a5; }
.modal-toggle { margin: 14px 20px 0; width: calc(100% - 40px); }

/* Timer */
.timer-card { text-align: center; }
.timer-phase-label { font-size: 1rem; color: var(--muted); margin-bottom: 6px; }
.timer-display {
  font-size: 4rem; font-weight: 800; letter-spacing: 2px;
  margin: 14px 0; font-variant-numeric: tabular-nums;
}
.timer-controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 12px; }
.timer-final { font-size: 1.4rem; margin: 12px 0; }
.exchange-count {
  font-size: 2.2rem; font-weight: 700; margin: 16px 0; color: var(--accent-2);
}
.center-card { display: flex; justify-content: center; }

.rounds-table { margin-top: 12px; display: flex; flex-direction: column; gap: 4px; }
.rounds-row {
  display: grid; grid-template-columns: 74px 1fr 1fr 32px;
  align-items: center; gap: 6px; padding: 6px 4px; border-radius: 8px;
}
.rounds-head { color: var(--muted); font-size: 0.75rem; }
.rounds-row.estimated { background: rgba(251,191,36,0.06); }
.rounds-label { font-size: 0.85rem; }
.unit { font-size: 0.75rem; color: var(--muted); margin-left: 4px; }

/* Bottom nav */
nav.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; justify-content: center;
  background: rgba(15,17,21,0.97);
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
  z-index: 10;
}
.tabbar-inner { display: flex; width: 100%; max-width: 640px; }
.tab-btn {
  flex: 1; background: none; border: none; color: var(--muted);
  padding: 12px 4px 10px; font-size: 0.72rem; display: flex; flex-direction: column;
  align-items: center; gap: 3px; cursor: pointer;
}
.tab-btn .tab-icon { font-size: 1.3rem; }
.tab-btn.active { color: var(--accent-2); }

@media (min-width: 480px) {
  .timer-display { font-size: 5rem; }
}

/* Onglet Règles — slides "prompteur" pour expliquer le jeu en salle */
.slide-card {
  min-height: 60vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 32px 20px;
}
.slide-emoji { font-size: 3.5rem; margin-bottom: 18px; }
.slide-title {
  font-size: 1.15rem; font-weight: 700; color: var(--accent-2);
  text-transform: uppercase; letter-spacing: 0.5px;
  padding-bottom: 14px; margin-bottom: 18px;
  border-bottom: 2px solid var(--border);
  width: 100%; max-width: 420px;
}
.slide-lines { font-size: 1.15rem; line-height: 1.65; color: var(--text); max-width: 420px; }
.slide-lines p { margin: 0 0 10px; }
.slide-progress { display: flex; justify-content: center; gap: 6px; margin: 14px 0; }
.slide-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
.slide-dot.active { background: var(--accent); width: 20px; border-radius: 4px; }
.slide-nav { display: flex; gap: 10px; padding: 0 4px; }
.slide-nav .btn { flex: 1; }
.slide-intro { text-align: center; padding: 20px 4px 6px; }
.slide-intro .btn { width: 100%; margin-top: 12px; }

</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div class="top-row">
      <div>
        <h1>💣 Two Rooms and a Boom</h1>
        <div class="subtitle">Compagnon du Maître de Jeu — Éditions Rouge &amp; Bleue</div>
      </div>
      <button id="new-game-btn" class="btn btn-ghost btn-sm new-game-btn">🔄 Nouvelle partie</button>
    </div>
    <button id="timer-badge" class="timer-badge" style="display:none" aria-label="Aller au minuteur"></button>
  </header>

  <main>
    <section id="view-regles" class="view"></section>
    <section id="view-salles" class="view"></section>

// Termes d'attributs précis (par opposition aux mécaniques génériques comme "Otage"
// ou "Partage de cartes", utilisées par presque tous les rôles à pouvoir : les lister
// à part sert à la fois à éviter la redondance avec la définition générique "Attribut"
// et à ne détecter comme "interactions entre rôles" que les vrais couplages d'attributs.
const ATTRIBUTE_TERMS = ['Attribut « mort »', 'Immunisé', '« Astucieux »', '« Discret »', '« Imprudent »',
  '« Méfiant »', '« Timide »', '« Honnête »', '« Menteur »', '« Maudit »', '« Immobilisé »', '« Anéanti »',
  '« Non-voyant »', '« Amoureux »', '« Haineux »'];

function findGlossaryMatches(text) {
  const lower = (text || '').toLowerCase();
  const found = GLOSSARY.filter(g => g.match.some(m => lower.includes(m)));
  // Évite la redondance : si un attribut précis est déjà expliqué (mort, immunisé),
  // ne pas aussi afficher la définition générique "Attribut".
  const hasSpecificAttribute = found.some(g => ATTRIBUTE_TERMS.includes(g.term));
  return found.filter(g => !(g.term === 'Attribut' && hasSpecificAttribute));
}

// Certains rôles sont liés à PLUSIEURS autres à la fois (pas juste un binôme) : PAIR_MAP
// ne peut représenter qu'une relation 1-à-1, donc on ajoute ici les groupes plus larges.
// Exemple : Sniper / Cible / Leurre, dont le texte officiel dit explicitement
// « à inclure ensemble » — cocher l'un doit ajouter les deux autres.
const GROUP_LINKS = [
  ['sniper', 'cible', 'leurre']
];
const GROUP_MATES = {};
GROUP_LINKS.forEach(group => {
  group.forEach(id => { GROUP_MATES[id] = group.filter(other => other !== id); });
});
function linkedMates(id) {
  if (GROUP_MATES[id]) return GROUP_MATES[id];
  if (PAIR_MAP[id]) return [PAIR_MAP[id]];
  return [];
}

// Rôles "génériques" sans pouvoir (Équipe bleue / Équipe rouge) : contrairement aux
// personnages nommés, une partie peut en compter plusieurs exemplaires à la fois pour
// compléter l'effectif. Toujours ajoutés en miroir : +1 d'un côté ajoute +1 de l'autre,
// pour garder l'équilibre bleu/rouge (le livret ne précise pas de nombre maximum de
// cartes physiques dans le texte consulté ; le compteur n'impose donc pas de plafond,
// à ajuster selon le matériel réellement disponible).
const COUNTABLE_ROLES = ['equipe-bleue', 'equipe-rouge'];
const COUNTABLE_MIRROR = { 'equipe-bleue': 'equipe-rouge', 'equipe-rouge': 'equipe-bleue' };

function getRoleCount(id) {
  if (COUNTABLE_ROLES.includes(id)) return state.squadCounts[id] || 0;
  return state.squad[id] ? 1 : 0;
}
function setRoleCount(id, n) {
  n = Math.max(0, n);
  state.squadCounts[id] = n;
  state.squad[id] = n > 0;
  const mirror = COUNTABLE_MIRROR[id];
  if (mirror) {
    state.squadCounts[mirror] = n;
    state.squad[mirror] = n > 0;
  }
  state.squadFromConfigGeneration = false;
  saveState();
}
function squadHeadcount(ids) {
  return ids.reduce((sum, id) => sum + getRoleCount(id), 0);
}

  { id: 'fille-du-president', name: 'Fille du président', team: 'bleu', pairName: 'Martyr',

  { id: 'homme-de-main-bleu', name: 'Homme de main', team: 'bleu', pairName: 'Homme de main (rouge)',

  { id: 'ingenieur', name: 'Ingénieur', team: 'rouge', pairName: 'Médecin',

    plus: "Personnages ayant un pouvoir lié au partage de cartes recommandés (ex. Momie).", minus: "Les parties avec l'Ingénieur peuvent déboucher sur des parties où tous les joueurs perdent." },
  { id: 'medecin', name: 'Médecin', team: 'bleu', pairName: 'Ingénieur',

  { id: 'invincible-bleu', name: 'Invincible', team: 'bleu', pairName: 'Invincible (rouge)',

  { id: 'invincible-rouge', name: 'Invincible', team: 'rouge', pairName: 'Invincible (bleu)',

  { id: 'romeo', name: 'Roméo', team: 'gris', pairName: 'Juliette', linked: true,

  { id: 'maire-bleu', name: 'Maire', team: 'bleu', pairName: 'Maire (rouge)',

  { id: 'maire-rouge', name: 'Maire', team: 'rouge', pairName: 'Maire (bleu)',

  { id: 'negociateur-bleu', name: 'Négociateur', team: 'bleu', pairName: 'Négociateur (rouge)',

  { id: 'negociateur-rouge', name: 'Négociateur', team: 'rouge', pairName: 'Négociateur (bleu)',

  { id: 'paparazzi-bleu', name: 'Paparazzi', team: 'bleu', pairName: 'Paparazzi (rouge)',
    desc: "Faites de votre mieux pour qu'il n'y ait pas de conversations privées : soyez aussi intrusif et curieux que possible (regardez par-dessus l'épaule des joueurs, couchez-vous par terre pour voir le dessous des cartes...), sans jamais toucher les autres joueurs. Avec la variante Promesse de confidentialité, ignorez-en la règle tant que vous révélez publiquement votre carte pour prouver votre droit d'être envahissant.",
    plus: "Variante Promesse de confidentialité recommandée." },
  { id: 'paparazzi-rouge', name: 'Paparazzi', team: 'rouge', pairName: 'Paparazzi (bleu)',
    desc: "Faites de votre mieux pour qu'il n'y ait pas de conversations privées : soyez aussi intrusif et curieux que possible (regardez par-dessus l'épaule des joueurs, couchez-vous par terre pour voir le dessous des cartes...), sans jamais toucher les autres joueurs. Avec la variante Promesse de confidentialité, ignorez-en la règle tant que vous révélez publiquement votre carte pour prouver votre droit d'être envahissant.",

  { id: 'parieur', name: 'Parieur', team: 'gris', edition: 'both',
    desc: "À la fin du dernier tour, avant que tous les joueurs ne révèlent leur carte, vous devez annoncer publiquement quelle équipe (Équipe bleue, Équipe rouge, ou aucune des deux) va, selon vous, gagner la partie. Si vous avez correctement deviné, vous gagnez la partie. Sinon, vous perdez.\n\nAjouté automatiquement quand le nombre de joueurs est impair." },

  { id: 'patate-chaude', name: 'Patate chaude', team: 'gris',
    desc: "Vous avez le pouvoir PATATE CHAUDE : tout joueur qui partage sa carte ou sa couleur avec vous échange immédiatement sa carte contre la vôtre. Si vous avez encore la Patate chaude à la fin de la partie, vous perdez.\n\nRemarque : en raison de la règle qui rend les cartes échangées vierges, tout attribut précédemment reçu est perdu lors de l'échange.",
    plus: "Variante Promesse de confidentialité recommandée.", minus: "Personnages ne pouvant refuser les partages de cartes non recommandés (ex. Despote nucléaire)." },

  { id: 'poseur-bombe', name: 'Poseur de bombe', team: 'rouge', pairName: 'Président', linked: true, edition: 'both',
    desc: "Vous êtes l'un des personnages principaux. Tous ceux qui se trouvent dans la même pièce que vous à la fin de la partie reçoivent l'attribut « mort ». L'Équipe rouge gagne la partie si le Président reçoit l'attribut « mort ».\n\nRemarque : si le Poseur de bombe reçoit l'attribut « mort » avant la détonation de la bombe, tous ceux qui se trouvent dans sa pièce à la fin de la partie ne reçoivent pas automatiquement cet attribut.",
    plus: "Les personnages devant connaître l'identité du Poseur de bombe sont vos alliés naturels (ex. Survivant, Victime, Moby Dick, Achab)." },
  { id: 'president', name: 'Président', team: 'bleu', pairName: 'Poseur de bombe', linked: true, edition: 'both',
    desc: "Vous êtes l'un des personnages principaux. L'Équipe bleue gagne la partie si vous ne recevez pas l'attribut « mort ».",

  { id: 'rival', name: 'Rival', team: 'gris',

  { id: 'survivant', name: 'Survivant', team: 'gris',

  { id: 'robot', name: 'Robot', team: 'gris',
    desc: "Vous gagnez la partie si le premier joueur avec qui vous avez partagé votre carte ou votre couleur n'atteint pas son ou ses objectifs de victoire. Si vous n'avez partagé avec aucun joueur avant la fin de la partie, vous perdez.\n\nRemarque : si le premier personnage avec qui vous avez partagé vos informations était le Clone, et que le premier partage du Clone était avec vous, vous perdez tous les deux.",
    plus: "Clone recommandé." },

  { id: 'usurpateur-bleu', name: 'Usurpateur', team: 'bleu', pairName: 'Usurpateur (rouge)',
    desc: "Vous avez le pouvoir USURPATEUR : durant n'importe quel tour à l'exception du dernier, vous pouvez révéler publiquement votre carte et devenir immédiatement le nouveau leader. Votre carte reste alors révélée pour le reste de la partie (pouvoir utilisable une seule fois).\n\nRemarque : l'Usurpateur ne peut pas être destitué lors du tour où il a pris la place du leader. Si deux Usurpateurs d'une même pièce utilisent leur pouvoir en même temps, celui qui a révélé sa carte en premier devient le nouveau leader.",
    minus: "Après usage du pouvoir, les révélations et partages de cartes ne peuvent plus se faire avec ce joueur." },
  { id: 'usurpateur-rouge', name: 'Usurpateur', team: 'rouge', pairName: 'Usurpateur (bleu)',
    desc: "Vous avez le pouvoir USURPATEUR : durant n'importe quel tour à l'exception du dernier, vous pouvez révéler publiquement votre carte et devenir immédiatement le nouveau leader. Votre carte reste alors révélée pour le reste de la partie (pouvoir utilisable une seule fois).\n\nRemarque : l'Usurpateur ne peut pas être destitué lors du tour où il a pris la place du leader. Si deux Usurpateurs d'une même pièce utilisent leur pouvoir en même temps, celui qui a révélé sa carte en premier devient le nouveau leader.",
    minus: "Après usage du pouvoir, les révélations et partages de cartes ne peuvent plus se faire avec ce joueur." },

  { id: 'videur-bleu', name: 'Videur', team: 'bleu', pairName: 'Videur (rouge)',
    desc: "Vous avez le pouvoir VIDEUR : quand vous êtes dans la pièce qui compte le plus de joueurs, vous pouvez révéler votre carte en privé à n'importe quel joueur (sauf le leader) et lui dire : « Tu sors ! » Ce joueur doit alors immédiatement changer de pièce. Ce pouvoir ne fonctionne pas lors du dernier tour, entre les tours, ni quand vous n'êtes pas dans la pièce la plus peuplée.\n\nRemarque : n'incluez cette carte que s'il n'y a pas le même nombre de joueurs dans les deux pièces.",
    minus: "Peut conduire certains joueurs à faire des allers-retours jusqu'à la fin de la partie." },
  { id: 'videur-rouge', name: 'Videur', team: 'rouge', pairName: 'Videur (bleu)',
    desc: "Vous avez le pouvoir VIDEUR : quand vous êtes dans la pièce qui compte le plus de joueurs, vous pouvez révéler votre carte en privé à n'importe quel joueur (sauf le leader) et lui dire : « Tu sors ! » Ce joueur doit alors immédiatement changer de pièce. Ce pouvoir ne fonctionne pas lors du dernier tour, entre les tours, ni quand vous n'êtes pas dans la pièce la plus peuplée.\n\nRemarque : n'incluez cette carte que s'il n'y a pas le même nombre de joueurs dans les deux pièces.",
    minus: "Peut conduire certains joueurs à faire des allers-retours jusqu'à la fin de la partie." },

  { id: 'voyageur', name: 'Voyageur', team: 'gris',

    plus: "Agoraphobe recommandé.", minus: "Si le Voyageur reçoit l'attribut « zombie », il a alors deux objectifs de victoire." },

  { id: 'zombie', name: 'Zombie', team: 'zombie', guideColor: 'vert',
    desc: "Vous commencez avec l'attribut « zombie » et faites partie de l'Équipe zombie. À la fin de la partie, l'Équipe zombie gagne si tous les joueurs n'ayant pas l'attribut « mort » l'ont rejointe. Tout joueur qui fait un partage de cartes ou de couleurs avec un membre de l'Équipe zombie reçoit à son tour l'attribut « zombie » (il garde sa carte Personnage, ses pouvoirs et attributs, mais son objectif de victoire est remplacé par celui de l'Équipe zombie).\n\nTypiquement, on l'annonce ainsi : « Je suis un zombie, et maintenant toi aussi. »",
    plus: "Médecin, Ingénieur et variante Promesse de confidentialité recommandés.", minus: "Infirmier et Patate chaude non recommandés. Un personnage ayant fait une révélation publique permanente (ex. Usurpateur) ne peut plus devenir zombie. Non recommandé lors de vos premières parties." },

// Complète une liste d'ids jusqu'à atteindre targetCount, en ajoutant des cartes
// génériques Équipe bleue / Équipe rouge (sans pouvoir). Ajoute toujours du côté
// actuellement minoritaire, pour ne pas déséquilibrer bleu/rouge quand c'est évitable
// (ex. un manque de 2 cartes ajoute alors 1 bleue + 1 rouge).
function topUpToCount(ids, targetCount) {
  const result = ids.slice();
  while (result.length < targetCount) {
    const blueCount = result.filter(id => CHAR_BY_ID[id] && CHAR_BY_ID[id].team === 'bleu').length;
    const redCount = result.filter(id => CHAR_BY_ID[id] && CHAR_BY_ID[id].team === 'rouge').length;
    result.push(blueCount <= redCount ? 'equipe-bleue' : 'equipe-rouge');
  }
  return result;
}

// Calcule la liste d'ids de personnages suggérée pour n joueurs à partir d'une configuration.
function computeConfigSelection(configKey, n) {
  const cfg = CONFIG_SETS[configKey];
  if (!cfg) return { ids: [], note: '' };
  let ids = [];
  // On inclut toujours au moins le premier palier (le "noyau" de la configuration),
  // même si le nombre de joueurs actuellement saisi est en dessous : sinon, choisir une
  // configuration dont le premier palier est à 12 ou 16 joueurs alors que le champ est
  // encore sur sa valeur par défaut (souvent plus basse) affichait une liste vide.
  const effectiveN = Math.max(n, cfg.steps[0].n);
  cfg.steps.forEach(step => { if (step.n <= effectiveN) ids = ids.concat(step.ids); });

  let note = '';
  if (cfg.buriedCard) {
    // La carte enterrée exige un paquet contenant UNE carte de plus que de joueurs.
    // Certains effectifs tombent pile sur un palier du tableau (le nombre de cartes
    // égale alors n) : on complète avec une carte générique pour garantir la carte
    // à enterrer, quel que soit l'effectif exact.
    const target = n + 1;
    let added = 0;
    if (ids.length < target) {
      const before = ids.length;
      ids = topUpToCount(ids, target);
      added = ids.length - before;
    }
    note = "Cette configuration utilise une carte enterrée : le paquet contient un personnage de plus que de joueurs (" + ids.length + " cartes pour " + n + " joueurs, 1 sera enterrée face cachée)." +
      (added ? ' (' + added + ' carte' + (added > 1 ? 's' : '') + ' générique' + (added > 1 ? 's' : '') + ' Équipe bleue/rouge ajoutée' + (added > 1 ? 's' : '') + ' pour compléter le tableau à cet effectif.)' : '');
  } else if (n % 2 === 1 && ids.length) {
    if (cfg.customOdd) {
      const result = cfg.customOdd(n, ids);
      ids = result.ids;
      note = result.note;
    } else if (cfg.oddCard) {
      ids.push(cfg.oddCard.id);
      note = "Nombre de joueurs impair : la carte " + cfg.oddCard.label + " a été ajoutée automatiquement.";
    } else {
      ids.push('parieur');
      note = "Nombre de joueurs impair : la carte Parieur a été ajoutée automatiquement.";
    }
  }

  // Filet de sécurité : certains tableaux officiels avancent par paliers de 2 en 2 et
  // sautent parfois un effectif pair (ex. le tableau bleu "Tous les chats sont gris"
  // passe de 18 à 21 joueurs sans palier à 20). On comble alors l'écart avec des
  // cartes génériques Équipe bleue/rouge, ajoutées en miroir pour garder l'équilibre.
  if (!cfg.buriedCard && ids.length < n) {
    const before = ids.length;
    ids = topUpToCount(ids, n);
    const added = ids.length - before;
    const fillNote = added + ' carte' + (added > 1 ? 's' : '') + ' générique' + (added > 1 ? 's' : '') + ' (Équipe bleue/rouge) ajoutée' + (added > 1 ? 's' : '') + " pour compléter l'effectif (écart dans le tableau officiel à ce nombre précis de joueurs).";
    note = note ? note + ' ' + fillNote : fillNote;
  }

  if (n < cfg.range[0] || n > cfg.range[1]) {
    note += (note ? ' ' : '') + `Cette configuration est prévue pour ${cfg.range[0]} à ${cfg.range[1]} joueurs ; ajustez manuellement si besoin.`;
  }
  return { ids, note };
}

function getDefaultRounds(n, mode) {
  const bracket = n <= 10 ? 'a' : (n <= 21 ? 'b' : 'c');
  if (mode === 'simple' || n <= 10) {
    const hostages = bracket === 'a' ? [1, 1, 1] : (bracket === 'b' ? [2, 1, 1] : [3, 2, 1]);
    return [
      { duration: 180, hostages: hostages[0] },
      { duration: 120, hostages: hostages[1] },
      { duration: 60, hostages: hostages[2] }
    ];
  }
  // mode avancé, > 10 joueurs
  if (bracket === 'b') {
    return [
      { duration: 300, hostages: 3, estimated: true },
      { duration: 240, hostages: 2, estimated: true },
      { duration: 180, hostages: 2 },
      { duration: 120, hostages: 1 },
      { duration: 60, hostages: 1 }
    ];
  }
  return [
    { duration: 300, hostages: 4, estimated: true },
    { duration: 240, hostages: 3, estimated: true },
    { duration: 180, hostages: 3 },
    { duration: 120, hostages: 2 },
    { duration: 60, hostages: 1 }
  ];
}
