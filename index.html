<script>
// ============================================================
// ÉTAT & PERSISTANCE
// ============================================================
const STORAGE_KEY = 'trab_mj_state_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* ignore */ }
  return null;
}

function defaultState() {
  return {
    players: [],
    playerHistory: [],
    roomA: [],
    roomB: [],
    roomALabel: 'Salle A',
    roomBLabel: 'Salle B',
    squad: {},            // id -> true si sélectionné pour la partie
    squadCounts: {},      // id -> nombre d'exemplaires, pour les rôles "génériques" (Équipe bleue/rouge)
    squadConfig: 'reference',
    // true seulement juste après un clic sur "Générer" à partir d'une configuration
    // officielle, tant que rien n'a été retouché à la main depuis : sert à ne pas
    // afficher un avertissement de seuil de joueurs qui contredirait le tableau
    // officiel qu'on vient d'appliquer (ex. Négociateur dès 6 joueurs dans la config
    // de référence, alors que sa fiche dit "non recommandé à 10 joueurs ou moins").
    squadFromConfigGeneration: false,
    hideSuggestions: false, // masque les suggestions 💡 (pas les avertissements ⚠️) dans l'onglet Rôles
    explicationShowFull: true, // onglet Explication : texte officiel complet affiché (true) ou résumé seul (false)
    targetPlayers: null,   // nombre de joueurs visé, partagé entre l'onglet Rôles et le Minuteur
    timer: {
      mode: 'auto',        // 'auto' | 'simple' | 'avance'
      rounds: null,        // tableau {duration, hostages, estimated} ou null = auto
      currentIndex: 0,
      remaining: 0,
      phase: 'idle',        // idle | running | paused | exchange | finished
      soundOn: true
    }
  };
}

let state = loadState() || defaultState();
if (!state.timer) state.timer = defaultState().timer;
if (!state.playerHistory) state.playerHistory = state.players ? state.players.slice() : [];
if (state.targetPlayers === undefined) state.targetPlayers = null;
if (state.hideSuggestions === undefined) state.hideSuggestions = false;
if (!state.squadCounts) state.squadCounts = {};
if (state.squadFromConfigGeneration === undefined) state.squadFromConfigGeneration = false;

// L'onglet Salles (liste de joueurs nommés) est la source de vérité pour l'effectif.
// Les onglets Rôles et Minuteur s'y calent automatiquement dès qu'il y a des joueurs
// ajoutés, pour éviter d'avoir à retaper le même chiffre à trois endroits différents.
function currentTargetPlayers() {
  if (state.players.length) return state.players.length;
  return state.targetPlayers || 10;
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { /* ignore */ }
}

// ============================================================
// NAVIGATION
// ============================================================
const TABS = ['regles', 'salles', 'roles', 'explication', 'minuteur', 'finpartie'];
let currentTab = 'salles';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.id === 'view-' + tab));
  if (tab === 'regles') renderRegles();
  if (tab === 'salles') { lastDeletedPlayer = null; renderSalles(); }
  if (tab === 'roles') renderRoles();
  if (tab === 'explication') renderExplication();
  if (tab === 'minuteur') renderMinuteur();
  if (tab === 'finpartie') renderFinPartie();
  updateTimerBadge();
}

// Boîte de dialogue maison (remplace window.confirm, qui a l'air d'un popup
// de navigateur et casse l'ambiance sur mobile).
function showConfirm(message, onConfirm) {
  const overlay = document.getElementById('confirm-modal');
  document.getElementById('confirm-message').textContent = message;
  const okBtn = document.getElementById('confirm-ok');
  const cancelBtn = document.getElementById('confirm-cancel');
  const newOk = okBtn.cloneNode(true);
  okBtn.parentNode.replaceChild(newOk, okBtn);
  const newCancel = cancelBtn.cloneNode(true);
  cancelBtn.parentNode.replaceChild(newCancel, cancelBtn);
  newOk.addEventListener('click', () => { overlay.classList.remove('open'); onConfirm(); });
  newCancel.addEventListener('click', () => { overlay.classList.remove('open'); });
  overlay.classList.add('open');
}

function startNewGame() {
  showConfirm(
    'Recommencer une nouvelle partie ?\n\nLes salles, les rôles sélectionnés et le minuteur seront réinitialisés.\nLes joueurs restent en place (c\u2019est souvent le même groupe qui rejoue) — modifiez la liste dans l\u2019onglet Salles si besoin.',
    () => {
      stopTicking();
      state.roomA = [];
      state.roomB = [];
      state.squad = {};
      state.squadCounts = {};
      state.timer = defaultState().timer;
      rulesSlideIndex = 0;
      ensureRounds();
      saveState();
      switchTab('salles');
    }
  );
}

// ============================================================
// UTILITAIRES
// ============================================================
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function fmtTime(sec) {
  sec = Math.max(0, Math.round(sec));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}

// Le nombre de joueurs n'a plus qu'une seule source de vérité : la liste de l'onglet
// Salles (state.players). Les autres onglets ne font qu'afficher ce nombre et
// renvoient vers Salles pour le modifier — avoir un second réglage indépendant y
// créait un bouton +/- qui semblait "ne rien faire" dès qu'au moins un joueur était nommé.
function playerCountChip() {
  const n = currentTargetPlayers();
  const chip = el('button', 'btn btn-ghost btn-sm player-count-chip', '👥 ' + n + ' joueur' + (n > 1 ? 's' : '') + ' — régler dans Salles');
  chip.type = 'button';
  chip.addEventListener('click', () => switchTab('salles'));
  return chip;
}

// Contrôle +/- générique, pensé pour le tactile : remplace un champ numérique à taper
// par deux boutons et une valeur affichée. size:'big' pour un réglage principal (nombre
// de joueurs), size:'mini' pour une valeur dans une ligne compacte (tableau des manches).
// Ne modifie jamais la valeur lui-même : onChange reçoit la nouvelle valeur, à l'appelant
// de mettre à jour l'état et de re-render (même logique que les autres steppers de l'appli).
function stepperControl(value, opts) {
  opts = opts || {};
  const min = opts.min !== undefined ? opts.min : -Infinity;
  const max = opts.max !== undefined ? opts.max : Infinity;
  const step = opts.step || 1;
  const decimals = opts.decimals || 0;
  const suffix = opts.suffix || '';
  const mini = opts.size === 'mini';
  const wrap = el('div', mini ? 'role-stepper' : 'big-stepper');
  const minusBtn = el('button', mini ? 'role-step-btn' : 'big-step-btn', '−');
  minusBtn.type = 'button';
  minusBtn.setAttribute('aria-label', (opts.label ? opts.label + ' : ' : '') + 'diminuer');
  minusBtn.disabled = value <= min;
  const labelText = opts.format ? opts.format(value) : (value.toFixed(decimals) + suffix);
  const valueSpan = el('span', mini ? 'role-step-count' : 'big-step-value', labelText);
  const plusBtn = el('button', mini ? 'role-step-btn' : 'big-step-btn', '+');
  plusBtn.type = 'button';
  plusBtn.setAttribute('aria-label', (opts.label ? opts.label + ' : ' : '') + 'augmenter');
  plusBtn.disabled = value >= max;
  minusBtn.addEventListener('click', () => opts.onChange(Math.max(min, +(value - step).toFixed(6))));
  plusBtn.addEventListener('click', () => opts.onChange(Math.min(max, +(value + step).toFixed(6))));
  wrap.appendChild(minusBtn);
  wrap.appendChild(valueSpan);
  wrap.appendChild(plusBtn);
  return wrap;
}

// ============================================================
// ONGLET 0 — RÈGLES (slides "prompteur" pour expliquer le jeu en salle)
// ============================================================
let rulesSlideIndex = 0;

function renderRegles() {
  const root = document.getElementById('view-regles');
  root.innerHTML = '';

  const headRow = el('div', 'card-head-row');
  headRow.appendChild(el('h2', null, '📘 Expliquer les règles'));
  const restartBtn = el('button', 'btn btn-ghost btn-sm', '↺ Recommencer');
  headRow.appendChild(restartBtn);
  const headCard = el('div', 'card');
  headCard.appendChild(headRow);
  headCard.appendChild(el('p', 'muted', 'À faire défiler devant toute la salle avant la première partie — un slide, une idée, à lire à voix haute.'));
  root.appendChild(headCard);

  const slideZone = el('div', 'card');
  root.appendChild(slideZone);

  function showSlide(i) {
    rulesSlideIndex = Math.max(0, Math.min(i, RULES_SLIDES.length - 1));
    const s = RULES_SLIDES[rulesSlideIndex];
    slideZone.innerHTML = '';
    const card = el('div', 'slide-card');
    card.appendChild(el('div', 'slide-emoji', s.emoji));
    card.appendChild(el('div', 'slide-title', s.title));
    const lines = el('div', 'slide-lines');
    s.lines.forEach(l => lines.appendChild(el('p', null, l)));
    card.appendChild(lines);
    slideZone.appendChild(card);

    const dots = el('div', 'slide-progress');
    RULES_SLIDES.forEach((_, idx) => dots.appendChild(el('span', 'slide-dot' + (idx === rulesSlideIndex ? ' active' : ''))));
    slideZone.appendChild(dots);

    const nav = el('div', 'slide-nav');
    const prevBtn = el('button', 'btn btn-secondary', '← Précédent');
    prevBtn.disabled = rulesSlideIndex === 0;
    prevBtn.addEventListener('click', () => showSlide(rulesSlideIndex - 1));
    const nextBtn = el('button', 'btn btn-primary', rulesSlideIndex === RULES_SLIDES.length - 1 ? 'Terminer' : 'Suivant →');
    nextBtn.addEventListener('click', () => {
      if (rulesSlideIndex === RULES_SLIDES.length - 1) { switchTab('salles'); return; }
      showSlide(rulesSlideIndex + 1);
    });
    nav.appendChild(prevBtn);
    nav.appendChild(nextBtn);
    slideZone.appendChild(nav);
  }

  restartBtn.addEventListener('click', () => showSlide(0));
  showSlide(rulesSlideIndex);
}

// ============================================================
// ONGLET 1 — SALLES (répartition aléatoire des joueurs)
// ============================================================
// Pas de confirmation pour supprimer un seul joueur (trop lent à l'usage en vraie
// partie) : à la place, un lien "Annuler" éphémère permet de revenir en arrière en cas
// de faux clic. Effacé dès qu'on quitte l'onglet ou qu'on fait autre chose.
let lastDeletedPlayer = null;

function renderSalles() {
  const root = document.getElementById('view-salles');
  root.innerHTML = '';

  const addBox = el('div', 'card');
  const title = el('h2', null, '👥 Joueurs dans la partie');
  addBox.appendChild(title);

  // Gère les homonymes : si "Julien" existe déjà, le suivant devient "Julien (2)",
  // etc. excludeIdx permet de renommer un joueur sans se bloquer sur son propre nom.
  function sameName(a, b) {
    return a.trim().toLowerCase() === b.trim().toLowerCase();
  }
  function uniquePlayerName(base, excludeIdx) {
    const conflicts = (n) => state.players.some((p, i) => i !== excludeIdx && sameName(p, n));
    if (!conflicts(base)) return base;
    let i = 2;
    while (conflicts(base + ' (' + i + ')')) i++;
    return base + ' (' + i + ')';
  }
  function removePlayerEverywhere(name) {
    state.roomA = state.roomA.filter(n => n !== name);
    state.roomB = state.roomB.filter(n => n !== name);
  }

  // Stepper "Nombre de joueurs" : en augmentant, on ajoute des étiquettes génériques
  // (Joueur N) pour les places manquantes plutôt que de forcer à les nommer tout de
  // suite ; en diminuant, on retire en priorité les étiquettes génériques non
  // renommées, pour ne jamais supprimer un vrai nom par accident si on peut l'éviter.
  const settingsBox = el('div', 'card');
  settingsBox.appendChild(el('h2', null, 'Nombre de joueurs'));
  const stepperRow = el('div', 'row-input wrap');
  stepperRow.appendChild(stepperControl(state.players.length, {
    min: 0, max: 40, step: 1, label: 'Nombre de joueurs',
    onChange: (v) => {
      const current = state.players.length;
      if (v > current) {
        for (let i = current; i < v; i++) {
          const placeholder = uniquePlayerName('Joueur ' + (i + 1), -1);
          state.players.push(placeholder);
        }
      } else if (v < current) {
        let toRemove = current - v;
        while (toRemove > 0) {
          let idx = -1;
          for (let i = state.players.length - 1; i >= 0; i--) {
            if (/^Joueur \d+$/.test(state.players[i])) { idx = i; break; }
          }
          if (idx === -1) idx = state.players.length - 1;
          removePlayerEverywhere(state.players[idx]);
          state.players.splice(idx, 1);
          toRemove--;
        }
      }
      saveState(); renderSalles();
    }
  }));
  settingsBox.appendChild(stepperRow);
  settingsBox.appendChild(el('p', 'muted small-note',
    'En augmentant le nombre, des étiquettes « Joueur 1, Joueur 2… » sont ajoutées automatiquement — touche un nom ci-dessous pour le renommer.'));
  addBox.appendChild(settingsBox);

  const form = el('div', 'row-input');
  const input = el('input', 'text-input');
  input.type = 'text';
  input.placeholder = 'Nom du joueur…';
  input.id = 'player-name-input';
  const addBtn = el('button', 'btn btn-primary', 'Ajouter');
  form.appendChild(input);
  form.appendChild(addBtn);
  addBox.appendChild(form);

  function addPlayerName(name) {
    if (!name) return;
    lastDeletedPlayer = null;
    const finalName = uniquePlayerName(name, -1);
    state.players.push(finalName);
    if (!state.playerHistory.includes(finalName)) state.playerHistory.push(finalName);
    saveState();
    renderSalles();
  }
  function addPlayer() {
    const name = input.value.trim();
    if (!name) return;
    addPlayerName(name);
    input.value = '';
    document.getElementById('player-name-input').focus();
  }
  addBtn.addEventListener('click', addPlayer);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });

  const quickRow = el('div', 'quick-row');
  const clearBtn = el('button', 'btn btn-ghost btn-sm danger', 'Vider la partie en cours');
  clearBtn.addEventListener('click', () => {
    const doClear = () => { lastDeletedPlayer = null; state.players = []; state.roomA = []; state.roomB = []; saveState(); renderSalles(); };
    if (state.players.length) {
      showConfirm('Retirer tous les joueurs de la partie en cours ?\n(Ils resteront dans l\u2019historique ci-dessous.)', doClear);
    } else {
      doClear();
    }
  });
  quickRow.appendChild(clearBtn);
  addBox.appendChild(quickRow);

  // Historique des joueurs déjà utilisés : pratique si quelqu'un part puis revient,
  // ou pour relancer une partie avec le même groupe sans tout retaper.
  const historyAvailable = state.playerHistory.filter(n => !state.players.includes(n));
  if (state.playerHistory.length) {
    const histBox = el('div', 'history-box');
    const histHead = el('div', 'history-head');
    histHead.appendChild(el('span', 'muted', '🕘 Pas encore dans la partie — touche pour ajouter'));
    const clearHistBtn = el('button', 'link-btn', 'Effacer l\'historique');
    clearHistBtn.addEventListener('click', () => {
      showConfirm('Effacer définitivement l\u2019historique des joueurs ?', () => {
        state.playerHistory = [];
        saveState(); renderSalles();
      });
    });
    histHead.appendChild(clearHistBtn);
    histBox.appendChild(histHead);

    const histWrap = el('div', 'chosen-wrap');
    if (!historyAvailable.length) {
      histWrap.appendChild(el('span', 'muted', 'Tous les joueurs de l\'historique sont déjà dans la partie.'));
    }
    historyAvailable.forEach(name => {
      const tag = el('span', 'chosen-tag history-tag');
      tag.textContent = '+ ' + name;
      tag.addEventListener('click', () => addPlayerName(name));
      const rm = el('button', 'chosen-rm', '✕');
      rm.title = 'Retirer définitivement de l\'historique';
      rm.addEventListener('click', (e) => {
        e.stopPropagation();
        state.playerHistory = state.playerHistory.filter(n => n !== name);
        saveState(); renderSalles();
      });
      tag.appendChild(rm);
      histWrap.appendChild(tag);
    });
    histBox.appendChild(histWrap);
    addBox.appendChild(histBox);
  }

  // Liste des joueurs — chaque nom est un champ éditable (touche pour renommer),
  // pour ne jamais avoir à ouvrir un dialogue séparé juste pour corriger une étiquette
  // générique "Joueur N" ou une faute de frappe.
  const listWrap = el('div', 'player-list');
  state.players.forEach((name, idx) => {
    const row = el('div', 'player-row');
    const nameInput = el('input', 'player-name');
    nameInput.type = 'text';
    nameInput.value = name;
    nameInput.size = Math.max(3, name.length);
    nameInput.setAttribute('aria-label', 'Renommer ' + name);
    nameInput.addEventListener('input', () => { nameInput.size = Math.max(3, nameInput.value.length); });
    nameInput.addEventListener('change', () => {
      const newName = nameInput.value.trim();
      if (!newName || sameName(newName, name)) { nameInput.value = name; return; }
      const finalName = uniquePlayerName(newName, idx);
      state.players[idx] = finalName;
      state.roomA = state.roomA.map(n => n === name ? finalName : n);
      state.roomB = state.roomB.map(n => n === name ? finalName : n);
      const histIdx = state.playerHistory.indexOf(name);
      if (histIdx !== -1) state.playerHistory[histIdx] = finalName;
      if (!state.playerHistory.includes(finalName)) state.playerHistory.push(finalName);
      saveState(); renderSalles();
    });
    row.appendChild(nameInput);
    const del = el('button', 'icon-btn', '✕');
    del.setAttribute('aria-label', 'Supprimer ' + name);
    del.addEventListener('click', () => {
      lastDeletedPlayer = { name, idx };
      removePlayerEverywhere(name);
      state.players.splice(idx, 1);
      saveState(); renderSalles();
    });
    row.appendChild(del);
    listWrap.appendChild(row);
  });
  addBox.appendChild(listWrap);

  const countLine = el('div', 'muted', state.players.length + ' joueur' + (state.players.length > 1 ? 's' : ''));
  addBox.appendChild(countLine);

  if (lastDeletedPlayer) {
    const undoLine = el('div', 'muted small-note');
    undoLine.appendChild(document.createTextNode('Joueur « ' + lastDeletedPlayer.name + ' » supprimé. '));
    const undoBtn = el('button', 'link-btn', 'Annuler');
    undoBtn.addEventListener('click', () => {
      const restored = lastDeletedPlayer;
      lastDeletedPlayer = null;
      const restoreIdx = Math.min(restored.idx, state.players.length);
      state.players.splice(restoreIdx, 0, restored.name);
      if (!state.playerHistory.includes(restored.name)) state.playerHistory.push(restored.name);
      saveState(); renderSalles();
    });
    undoLine.appendChild(undoBtn);
    addBox.appendChild(undoLine);
  }

  root.appendChild(addBox);

  // Répartition
  const splitBox = el('div', 'card');
  splitBox.appendChild(el('h2', null, 'Répartition des salles'));
  const splitRow = el('div', 'quick-row');
  const splitBtn = el('button', 'btn btn-primary', '🎲 Répartir aléatoirement');
  splitBtn.disabled = state.players.length < 2;
  splitBtn.addEventListener('click', () => {
    const shuffled = shuffle(state.players);
    const half = Math.floor(shuffled.length / 2);
    let extra = shuffled.length % 2;
    let sizeA = half + (extra && Math.random() < 0.5 ? 1 : 0);
    state.roomA = shuffled.slice(0, sizeA);
    state.roomB = shuffled.slice(sizeA);
    saveState(); renderSalles();
  });
  splitRow.appendChild(splitBtn);
  splitBox.appendChild(splitRow);

  if (state.roomA.length || state.roomB.length) {
    const cols = el('div', 'two-cols');
    const colA = el('div', 'room-col room-a');
    const labelRowA = el('div', 'room-label-row');
    const labelInputA = el('input', 'text-input room-label-input');
    labelInputA.type = 'text';
    labelInputA.value = state.roomALabel;
    labelInputA.setAttribute('aria-label', 'Nom de la salle A');
    labelInputA.addEventListener('change', () => {
      state.roomALabel = labelInputA.value.trim() || 'Salle A';
      saveState(); renderSalles();
    });
    labelRowA.appendChild(labelInputA);
    labelRowA.appendChild(el('span', 'muted', '(' + state.roomA.length + ')'));
    colA.appendChild(labelRowA);
    state.roomA.forEach((n, idx) => {
      const row = el('div', 'room-player');
      row.appendChild(el('span', null, n));
      const moveBtn = el('button', 'icon-btn', '⇄');
      moveBtn.title = 'Déplacer vers ' + state.roomBLabel;
      moveBtn.setAttribute('aria-label', 'Déplacer ' + n + ' vers ' + state.roomBLabel);
      moveBtn.addEventListener('click', () => {
        state.roomA.splice(idx, 1);
        state.roomB.push(n);
        saveState(); renderSalles();
      });
      row.appendChild(moveBtn);
      colA.appendChild(row);
    });
    const colB = el('div', 'room-col room-b');
    const labelRowB = el('div', 'room-label-row');
    const labelInputB = el('input', 'text-input room-label-input');
    labelInputB.type = 'text';
    labelInputB.value = state.roomBLabel;
    labelInputB.setAttribute('aria-label', 'Nom de la salle B');
    labelInputB.addEventListener('change', () => {
      state.roomBLabel = labelInputB.value.trim() || 'Salle B';
      saveState(); renderSalles();
    });
    labelRowB.appendChild(labelInputB);
    labelRowB.appendChild(el('span', 'muted', '(' + state.roomB.length + ')'));
    colB.appendChild(labelRowB);
    state.roomB.forEach((n, idx) => {
      const row = el('div', 'room-player');
      row.appendChild(el('span', null, n));
      const moveBtn = el('button', 'icon-btn', '⇄');
      moveBtn.title = 'Déplacer vers ' + state.roomALabel;
      moveBtn.setAttribute('aria-label', 'Déplacer ' + n + ' vers ' + state.roomALabel);
      moveBtn.addEventListener('click', () => {
        state.roomB.splice(idx, 1);
        state.roomA.push(n);
        saveState(); renderSalles();
      });
      row.appendChild(moveBtn);
      colB.appendChild(row);
    });
    cols.appendChild(colA);
    cols.appendChild(colB);
    splitBox.appendChild(cols);
    splitBox.appendChild(el('p', 'muted small-note', 'Touche ⇄ à côté d\u2019un joueur pour le déplacer manuellement dans l\u2019autre salle, sans tout retirer au sort.'));
  } else {
    splitBox.appendChild(el('p', 'muted', 'Ajoutez au moins 2 joueurs puis appuyez sur « Répartir aléatoirement ».'));
  }

  root.appendChild(splitBox);
}

// ============================================================
// ONGLET 2 — RÔLES (guide des personnages + sélection pour la partie)
// ============================================================
let roleFilter = 'tous';
let roleSearch = '';

// Ajoute/retire un personnage de la sélection de partie, et fait de même
// pour son binôme officiel (ex. cocher Ambassadeur bleu ajoute Ambassadeur rouge).
// ============================================================
// CONSEILS DE COMPOSITION — exploite le texte déjà présent dans plus/minus pour
// détecter automatiquement deux choses pendant que le MJ compose sa partie :
// 1) des combinaisons déconseillées par le livret (ex. Zombie + Infirmier),
// 2) des compléments recommandés pas encore ajoutés (ex. Cupidon suggère Éris).
// On ne réécrit aucune règle : on repère juste, dans le texte officiel déjà saisi,
// la mention d'un autre nom de personnage, et on affiche la phrase telle quelle.
// ============================================================
const NAME_TO_IDS = {};
CHARACTERS.forEach(c => {
  const key = c.name.toLowerCase();
  if (!NAME_TO_IDS[key]) NAME_TO_IDS[key] = [];
  NAME_TO_IDS[key].push(c.id);
});
const ALL_CHAR_NAMES = Object.keys(NAME_TO_IDS);

function namesMentionedIn(text, excludeName) {
  if (!text) return [];
  const lower = text.toLowerCase();
  const found = [];
  ALL_CHAR_NAMES.forEach(name => {
    if (name === excludeName) return;
    const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    // Certaines remarques sont formulées "Sans X, ..." (ex. Rival/Survivant) : la mise
    // en garde s'applique alors quand X est ABSENT de la sélection, pas quand il y est.
    const re = new RegExp('(^|[^a-zà-ÿ])(sans\\s+(?:le\\s+|la\\s+|les\\s+|l[\'\u2019]\\s*)?)?' + escaped + '($|[^a-zà-ÿ])', 'i');
    const m = lower.match(re);
    if (m) found.push({ name, withoutPrefix: !!m[2] });
  });
  return found;
}
// Cherche un motif "à N joueurs ou plus/moins" dans un texte, et dit si la condition
// est vraie pour l'effectif actuel (ex. Modeste : "Inutile à 10 joueurs ou moins.").
function checkCountCondition(text, currentN) {
  if (!text) return null;
  const m = text.match(/(\d+)\s*joueurs?\s*ou\s*(plus|moins)/i);
  if (!m) return null;
  const n = parseInt(m[1], 10);
  const satisfied = m[2].toLowerCase() === 'plus' ? currentN >= n : currentN <= n;
  return satisfied;
}

// Un texte "plus" purement auto-référentiel du type "Recommandé à 11 joueurs ou plus."
// (aucun autre nom de personnage cité) : on le distingue des recommandations qui citent
// un binôme, pour pouvoir suggérer le personnage LUI-MÊME quand il n'est pas encore
// sélectionné, plutôt que de perdre ce conseil (ex. Ambassadeur, Détective privé).
const SELF_COUNT_RECOMMEND = /^Recommandée?\s+à\s+\d+\s*joueurs?\s*ou\s*(plus|moins)\.?$/i;

function computeSquadAdvice() {
  const squadIds = Object.keys(state.squad).filter(id => state.squad[id]);
  const reps = squadIds.filter(id => !isDisplayDuplicate(id)).map(id => CHAR_BY_ID[id]).filter(Boolean);
  const inSquadNames = new Set(reps.map(c => c.name.toLowerCase()));
  const n = currentTargetPlayers();

  // Personnages déjà avalisés par le tableau officiel actif (si le MJ vient de générer
  // la sélection depuis une configuration officielle, sans y avoir retouché depuis) :
  // sert à ne pas afficher un avertissement de seuil qui contredirait ce tableau
  // (ex. le Négociateur, ajouté dès 6 joueurs par la config de référence, alors que sa
  // propre fiche dit "non recommandé à 10 joueurs ou moins" — les deux sources sont
  // officielles, on donne alors la priorité au tableau que le MJ a choisi d'appliquer).
  const configEndorsedIds = state.squadFromConfigGeneration
    ? new Set(computeConfigSelection(state.squadConfig, n).ids)
    : new Set();

  const warnings = [];
  const seenWarnKeys = new Set();
  const suggestionMap = new Map();

  reps.forEach(c => {
    const cName = c.name.toLowerCase();
    if (c.minus) {
      namesMentionedIn(c.minus, cName).forEach(({ name: otherName, withoutPrefix }) => {
        const present = inSquadNames.has(otherName);
        const trigger = withoutPrefix ? !present : present;
        if (trigger) {
          const key = (withoutPrefix ? 'absent:' : '') + [cName, otherName].sort().join('|');
          if (!seenWarnKeys.has(key)) {
            seenWarnKeys.add(key);
            warnings.push('⚠️ ' + c.name + ' : ' + c.minus);
          }
        }
      });
      if (checkCountCondition(c.minus, n) && !configEndorsedIds.has(c.id)) {
        const key = 'count:' + cName;
        if (!seenWarnKeys.has(key)) {
          seenWarnKeys.add(key);
          warnings.push('⚠️ ' + c.name + ' : ' + c.minus);
        }
      }
    }
    if (c.plus) {
      namesMentionedIn(c.plus, cName).forEach(({ name: otherName }) => {
        if (!inSquadNames.has(otherName) && NAME_TO_IDS[otherName]) {
          if (!suggestionMap.has(otherName)) {
            suggestionMap.set(otherName, { displayName: CHAR_BY_ID[NAME_TO_IDS[otherName][0]].name, sources: [] });
          }
          suggestionMap.get(otherName).sources.push(c.name);
        }
      });
    }
  });

  // Recommandations auto-référentielles ("Recommandé à N joueurs ou plus/moins.") pour
  // des personnages PAS ENCORE sélectionnés : jusqu'ici, ce texte était ignoré car il ne
  // cite aucun autre nom de personnage (ex. Ambassadeur, Détective privé).
  CHARACTERS.forEach(c => {
    if (state.squad[c.id]) return;
    if (isDisplayDuplicate(c.id)) return;
    if (!c.plus || !SELF_COUNT_RECOMMEND.test(c.plus.trim())) return;
    if (!checkCountCondition(c.plus, n)) return;
    const cName = c.name.toLowerCase();
    if (suggestionMap.has(cName)) return;
    suggestionMap.set(cName, { displayName: c.name, sources: ['cet effectif de joueurs (' + c.plus.replace(/\.$/, '') + ')'] });
  });

  return { warnings, suggestions: [...suggestionMap.values()] };
}

// Complète automatiquement les rôles manquants avec des cartes génériques Équipe
// bleue / Équipe rouge, ajoutées une par une du côté actuellement minoritaire (donc pas
// forcément par paire — contrairement au stepper manuel de la fiche Équipe bleue/rouge,
// qui lui garde toujours les deux couleurs strictement égales). Utilisé par le bouton
// "🧩 Combler les trous" quand la sélection compte moins de cartes que de joueurs.
function fillSquadGap() {
  const target = state.players.length;
  if (!target) return;
  const squadIds = Object.keys(state.squad).filter(id => state.squad[id]);
  let headcount = squadHeadcount(squadIds);
  if (headcount >= target) return;
  let blue = 0, rouge = 0;
  squadIds.forEach(id => {
    const c = CHAR_BY_ID[id];
    if (!c) return;
    if (c.team === 'bleu') blue += getRoleCount(id);
    if (c.team === 'rouge') rouge += getRoleCount(id);
  });
  while (headcount < target) {
    const id = blue <= rouge ? 'equipe-bleue' : 'equipe-rouge';
    state.squadCounts[id] = (state.squadCounts[id] || 0) + 1;
    state.squad[id] = true;
    if (id === 'equipe-bleue') blue++; else rouge++;
    headcount++;
  }
  state.squadFromConfigGeneration = false;
  saveState();
}

function setSquadMembership(id, on) {
  if (COUNTABLE_ROLES.includes(id)) {
    setRoleCount(id, on ? Math.max(1, getRoleCount(id)) : 0);
    return;
  }
  const mates = linkedMates(id);
  if (on) {
    state.squad[id] = true;
    mates.forEach(m => { state.squad[m] = true; });
  } else {
    delete state.squad[id];
    mates.forEach(m => { delete state.squad[m]; });
  }
  state.squadFromConfigGeneration = false;
  saveState();
}

function teamDotClass(team) {
  return 'dot dot-' + team;
}

// Certains rôles existent en 2 exemplaires strictement identiques (même nom,
// un bleu et un rouge, ex. Escroc). On les affiche comme une seule ligne pour
// ne pas encombrer la liste : on masque l'exemplaire rouge, le bleu sert de représentant.
function isMixteRole(c) {
  const p = PAIR_MAP[c.id];
  if (!p) return false;
  const partner = CHAR_BY_ID[p];
  return !!(partner && partner.name === c.name && partner.team !== c.team);
}
function isDisplayDuplicate(id) {
  const c = CHAR_BY_ID[id];
  if (!c || !isMixteRole(c)) return false;
  return c.team === 'rouge';
}
function matchesRoleFilter(c, filter) {
  if (filter === 'tous') return true;
  if (filter === 'mixte') return isMixteRole(c);
  // Vert et violet reprennent la couleur d'en-tête utilisée dans le guide des
  // personnages papier (vérifié sur les pages du guide) : Zombie et Farfadet ont un
  // bandeau vert, l'Ivrogne un bandeau violet — une catégorisation visuelle
  // distincte de l'équipe "grise", même si Farfadet et l'Ivrogne restent des
  // personnages gris à objectif individuel pour l'équilibrage bleu/rouge.
  if (filter === 'vert' || filter === 'violet') return c.guideColor === filter;
  // Un rôle "mixte" (même nom, existe en bleu ET en rouge, ex. Escroc) ne doit
  // apparaître que sous le filtre "Mixte" : les filtres Bleu/Rouge ne montrent que
  // les rôles réellement propres à leur couleur (ex. Chevalier bleu / Docteur Boom,
  // qui n'ont pas d'équivalent identique dans l'autre couleur).
  if (isMixteRole(c)) return false;
  return c.team === filter;
}
// La recherche ne porte pas que sur le nom : un MJ qui ne connaît pas les noms par
// cœur tape souvent un mot-clé de règle ("timide", "otage", "partage de couleur"...).
// On cherche donc aussi dans l'explication rapide et le texte officiel.
function roleMatchesSearch(c, q) {
  if (c.name.toLowerCase().includes(q)) return true;
  if (c.quick && c.quick.toLowerCase().includes(q)) return true;
  const combined = [c.desc, c.plus, c.minus].filter(Boolean).join(' ').toLowerCase();
  return combined.includes(q);
}
function dotClassForDisplay(c) {
  if (isMixteRole(c)) return 'dot dot-mixte';
  if (c.guideColor) return 'dot dot-' + c.guideColor;
  return teamDotClass(c.team);
}

function renderRoles() {
  const root = document.getElementById('view-roles');
  root.innerHTML = '';

  // --- Sélection rapide par configuration ---
  const cfgBox = el('div', 'card');
  const cfgHeadRow = el('div', 'card-head-row');
  cfgHeadRow.appendChild(el('h2', null, 'Sélection des rôles pour la partie'));
  const lexBtn = el('button', 'btn btn-ghost btn-sm', '📖 Lexique');
  lexBtn.addEventListener('click', () => openGlossary());
  cfgHeadRow.appendChild(lexBtn);
  cfgBox.appendChild(cfgHeadRow);

  const cfgRow = el('div', 'row-input wrap');
  cfgRow.appendChild(playerCountChip());

  const select = el('select', 'text-input');
  Object.keys(CONFIG_SETS).forEach(key => {
    const opt = el('option', null, CONFIG_SETS[key].label);
    opt.value = key;
    if (key === state.squadConfig) opt.selected = true;
    select.appendChild(opt);
  });

  const genBtn = el('button', 'btn btn-primary', 'Générer');
  cfgRow.appendChild(select);
  cfgRow.appendChild(genBtn);
  cfgBox.appendChild(cfgRow);

  const cfgNote = el('div', 'muted small-note');
  const previewNote = computeConfigSelection(select.value, currentTargetPlayers()).note;
  if (previewNote) cfgNote.textContent = previewNote;
  cfgBox.appendChild(cfgNote);

  genBtn.addEventListener('click', () => {
    const n = currentTargetPlayers();
    state.targetPlayers = n;
    state.squadConfig = select.value;
    const result = computeConfigSelection(select.value, n);
    state.squad = {};
    state.squadCounts = {};
    result.ids.forEach(id => {
      // Équipe bleue / Équipe rouge sont des rôles "comptables" (state.squadCounts) :
      // computeConfigSelection peut désormais en injecter plusieurs pour compléter un
      // effectif (voir topUpToCount) — il faut donc cumuler leur nombre plutôt que de
      // se contenter du booléen state.squad, sous peine d'un compteur figé à 0.
      if (COUNTABLE_ROLES.includes(id)) {
        state.squadCounts[id] = (state.squadCounts[id] || 0) + 1;
        state.squad[id] = true;
      } else {
        state.squad[id] = true;
      }
    });
    state.squadFromConfigGeneration = true;
    saveState();
    renderRoles();
  });

  root.appendChild(cfgBox);

  // --- Récapitulatif de la sélection courante ---
  const squadIds = Object.keys(state.squad).filter(id => state.squad[id]);
  const recap = el('div', 'card');
  const recapHeadRow = el('div', 'card-head-row');
  const headcount = squadHeadcount(squadIds);
  recapHeadRow.appendChild(el('h2', null, 'Personnages sélectionnés (' + headcount + ')'));
  const toggleSuggBtn = el('button', 'link-btn', state.hideSuggestions ? '💡 Afficher les suggestions' : '💡 Masquer les suggestions');
  toggleSuggBtn.addEventListener('click', () => {
    state.hideSuggestions = !state.hideSuggestions;
    saveState();
    renderRoles();
  });
  recapHeadRow.appendChild(toggleSuggBtn);
  recap.appendChild(recapHeadRow);
  const counts = { bleu: 0, rouge: 0, gris: 0, zombie: 0 };
  squadIds.forEach(id => { const c = CHAR_BY_ID[id]; if (c) counts[c.team] += getRoleCount(id); });
  const balanceLine = el('div', 'balance-line');
  balanceLine.appendChild(el('span', 'chip chip-bleu', '🔵 ' + counts.bleu));
  balanceLine.appendChild(el('span', 'chip chip-rouge', '🔴 ' + counts.rouge));
  balanceLine.appendChild(el('span', 'chip chip-gris', '⚪ ' + counts.gris));
  balanceLine.appendChild(el('span', 'chip chip-zombie', '🟢 ' + counts.zombie));
  recap.appendChild(balanceLine);
  // Une configuration à carte enterrée ajoute volontairement UNE carte de plus que de
  // joueurs (voir computeConfigSelection) : un écart de 1 entre bleu et rouge y est donc
  // normal (c'est souvent la carte qui finira enterrée), pas une vraie alerte à afficher.
  const activeCfg = CONFIG_SETS[state.squadConfig];
  const toleratedGap = activeCfg && activeCfg.buriedCard ? 1 : 0;
  if (Math.abs(counts.bleu - counts.rouge) > toleratedGap) {
    recap.appendChild(el('p', 'warning-text', '⚠️ Il doit normalement y avoir autant de cartes bleues que de cartes rouges (les cartes grises et le Zombie sont indépendants).'));
  }
  if (state.players.length && squadIds.length && headcount !== state.players.length) {
    const diff = headcount - state.players.length;
    recap.appendChild(el('p', 'warning-text',
      '⚠️ ' + headcount + ' rôle' + (headcount > 1 ? 's' : '') + ' sélectionné' + (headcount > 1 ? 's' : '') +
      ' pour ' + state.players.length + ' joueur' + (state.players.length > 1 ? 's' : '') + ' dans l\u2019onglet Salles' +
      (diff > 0 ? ' — il y a ' + diff + ' carte' + (diff > 1 ? 's' : '') + ' de trop.' : ' — il manque ' + (-diff) + ' carte' + (-diff > 1 ? 's' : '') + '.')));
    if (diff < 0) {
      const fillBtn = el('button', 'btn btn-secondary btn-sm fill-gap-btn',
        '🧩 Combler les ' + (-diff) + ' trou' + (-diff > 1 ? 's' : '') + ' (Équipe bleue/rouge)');
      fillBtn.addEventListener('click', () => { fillSquadGap(); renderRoles(); });
      recap.appendChild(fillBtn);
    }
  }
  if (squadIds.length) {
    const advice = computeSquadAdvice();
    advice.warnings.forEach(w => recap.appendChild(el('p', 'warning-text', w)));
    if (!state.hideSuggestions && advice.suggestions.length) {
      advice.suggestions.forEach(s => {
        recap.appendChild(el('div', 'suggestion-text',
          '💡 ' + s.displayName + ' recommandé avec ' + s.sources.join(', ') + ' — pas encore dans la sélection.'));
      });
    }
  }
  if (squadIds.length) {
    const chosenWrap = el('div', 'chosen-wrap');
    squadIds
      .filter(id => !isDisplayDuplicate(id))
      .sort((a, b) => CHAR_BY_ID[a].name.localeCompare(CHAR_BY_ID[b].name, 'fr'))
      .forEach(id => {
        const c = CHAR_BY_ID[id];
        if (!c) return;
        const tag = el('span', 'chosen-tag tappable team-' + (isMixteRole(c) ? 'mixte' : c.team));
        const qty = COUNTABLE_ROLES.includes(id) ? getRoleCount(id) : 0;
        const label = el('span', null, c.name + (qty > 1 ? ' ×' + qty : ''));
        tag.appendChild(label);
        tag.addEventListener('click', () => openRoleDetail(id, 'build'));
        const rm = el('button', 'chosen-rm', '✕');
        rm.addEventListener('click', (e) => { e.stopPropagation(); setSquadMembership(id, false); renderRoles(); });
        tag.appendChild(rm);
        chosenWrap.appendChild(tag);
      });
    recap.appendChild(el('p', 'muted small-note', 'Touche un rôle pour l\u2019expliquer rapidement.'));
    recap.appendChild(chosenWrap);
    const clearSquad = el('button', 'btn btn-ghost btn-sm danger', 'Vider la sélection');
    clearSquad.addEventListener('click', () => { state.squad = {}; state.squadCounts = {}; state.squadFromConfigGeneration = false; saveState(); renderRoles(); });
    recap.appendChild(clearSquad);
  } else {
    recap.appendChild(el('p', 'muted', 'Aucun personnage sélectionné pour l\'instant.'));
  }
  // La liste complète est affichée avant le récapitulatif (voir plus bas) : ainsi,
  // cocher/décocher un rôle ne fait plus "sauter" la liste en faisant grandir ou
  // rétrécir un bloc situé au-dessus d'elle.

  // --- Guide complet des personnages ---
  const guideBox = el('div', 'card');
  guideBox.appendChild(el('h2', null, 'Liste des personnages'));

  const filterRow = el('div', 'filter-row');
  [['tous', 'Tous'], ['bleu', '🔵 Bleu'], ['rouge', '🔴 Rouge'], ['mixte', '🔵🔴 Mixte'], ['gris', '⚪ Gris'], ['vert', '🟢 Vert'], ['violet', '🟣 Violet']].forEach(([key, lbl]) => {
    const chip = el('button', 'filter-chip' + (roleFilter === key ? ' active' : ''), lbl);
    chip.addEventListener('click', () => { roleFilter = key; renderRoles(); });
    filterRow.appendChild(chip);
  });
  guideBox.appendChild(filterRow);

  const searchInput = el('input', 'text-input');
  searchInput.type = 'search';
  searchInput.placeholder = 'Nom, ou mot-clé';
  searchInput.value = roleSearch;
  searchInput.addEventListener('input', () => { roleSearch = searchInput.value; renderRoleListOnly(); });
  guideBox.appendChild(searchInput);

  const listBox = el('div', 'role-list');
  listBox.id = 'role-list-box';
  guideBox.appendChild(listBox);

  root.appendChild(guideBox);
  root.appendChild(recap);

  function renderRoleListOnly() {
    listBox.innerHTML = '';
    const q = roleSearch.trim().toLowerCase();
    const sorted = CHARACTERS.slice().sort((a, b) => a.name.localeCompare(b.name, 'fr'));
    sorted.forEach(c => {
      if (isDisplayDuplicate(c.id)) return;
      if (!matchesRoleFilter(c, roleFilter)) return;
      if (q && !roleMatchesSearch(c, q)) return;
      const inSquad = !!state.squad[c.id];
      const row = el('div', 'role-row' + (inSquad ? ' in-squad' : ''));
      row.dataset.roleId = c.id;
      const dot = el('span', dotClassForDisplay(c));
      row.appendChild(dot);
      const nameWrap = el('div', 'role-row-text');
      nameWrap.appendChild(el('div', 'role-row-name', c.name));
      // Micro-résumé (1 ligne, tronquée) : de loin, un nom seul ("Détective privé")
      // ne dit rien du rôle. Le lien/le binôme reste consultable dans le détail.
      if (c.quick) {
        nameWrap.appendChild(el('div', 'role-row-hint', c.quick));
      }
      row.appendChild(nameWrap);
      if (COUNTABLE_ROLES.includes(c.id) && inSquad) {
        const count = getRoleCount(c.id);
        const stepper = el('div', 'role-stepper');
        const minusBtn = el('button', 'role-step-btn', '−');
        minusBtn.type = 'button';
        minusBtn.setAttribute('aria-label', 'Retirer un exemplaire de ' + c.name);
        minusBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const beforeTop = row.getBoundingClientRect().top;
          const gridScrollBefore = listBox.scrollTop;
          setRoleCount(c.id, count - 1);
          renderRoles();
          const newGrid = document.getElementById('role-list-box');
          if (newGrid) newGrid.scrollTop = gridScrollBefore;
        });
        const countLabel = el('span', 'role-step-count', String(count));
        const plusBtn = el('button', 'role-step-btn', '+');
        plusBtn.type = 'button';
        plusBtn.setAttribute('aria-label', 'Ajouter un exemplaire de ' + c.name);
        plusBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const beforeTop = row.getBoundingClientRect().top;
          const gridScrollBefore = listBox.scrollTop;
          setRoleCount(c.id, count + 1);
          renderRoles();
          const newGrid = document.getElementById('role-list-box');
          if (newGrid) newGrid.scrollTop = gridScrollBefore;
        });
        stepper.appendChild(minusBtn);
        stepper.appendChild(countLabel);
        stepper.appendChild(plusBtn);
        row.appendChild(stepper);
      } else {
        row.appendChild(el('span', 'role-check', inSquad ? '✓' : ''));
      }
      const infoBtn = el('button', 'role-info-btn', 'ℹ️');
      infoBtn.type = 'button';
      infoBtn.setAttribute('aria-label', 'Explication de ' + c.name);
      infoBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        openRoleDetail(c.id, 'build');
      });
      row.appendChild(infoBtn);
      // Toucher la ligne = activer/désactiver le rôle pour la partie, immédiatement,
      // sans pop-up. Pour l'explication, on utilise le bouton ℹ️ à part.
      row.addEventListener('click', () => {
        const beforeTop = row.getBoundingClientRect().top;
        const gridScrollBefore = listBox.scrollTop;
        setSquadMembership(c.id, !state.squad[c.id]);
        renderRoles();
        const newGrid = document.getElementById('role-list-box');
        if (newGrid) newGrid.scrollTop = gridScrollBefore;
        const again = document.querySelector('.role-row[data-role-id="' + c.id + '"]');
        if (again) {
          const afterTop = again.getBoundingClientRect().top;
          document.querySelector('main').scrollTop += (afterTop - beforeTop);
        }
      });
      listBox.appendChild(row);
    });
    if (!listBox.children.length) {
      listBox.appendChild(el('p', 'muted', 'Aucun personnage ne correspond.'));
    }
  }
  renderRoleListOnly();
}

// Détecte les interactions entre le rôle affiché et les AUTRES rôles actuellement
// sélectionnés pour la partie, via les termes techniques qu'ils ont en commun
// (ex. Peureux donne « timide », Agent précise que son pouvoir ne marche pas sur un
// joueur « timide » : les deux textes mentionnent « timide », donc on les relie).
// On extrait la phrase exacte de l'AUTRE personnage qui contient le terme : un simple
// "aussi chez Agent" ne dit pas CE QUI SE PASSE, alors que la phrase officielle le dit
// déjà très bien, du point de vue de l'action concrète à la table.
// L'attribut « mort » est exclu : mentionné par presque tous les rôles à objectif, ce
// serait du bruit plutôt qu'une vraie interaction à signaler.
const INTERACTION_TERMS = ATTRIBUTE_TERMS.filter(t => t !== 'Attribut « mort »');

function findSentenceWithTerm(text, matchList) {
  const sentences = text.split(/\n\n|(?<=[.!?])\s+(?=[A-ZÀ-Ý])/);
  const lower = matchList.map(m => m.toLowerCase());
  const hit = sentences.find(s => lower.some(m => s.toLowerCase().includes(m)));
  return hit ? hit.trim() : null;
}

// Reformule en phrase simple le cas le plus fréquent : "un pouvoir ne s'applique pas à
// un attribut". Le texte officiel dit souvent la même chose à la troisième personne
// ("les personnages qui...") ; ici on la ramène à une consigne directe, du point de vue
// du joueur qui LIT la fiche — donc la formulation change selon qui, du rôle affiché ou
// de l'autre rôle, détient le pouvoir bloqué. Si le motif n'est pas reconnu avec
// certitude des deux côtés, on garde la phrase officielle telle quelle plutôt que de
// risquer une reformulation fausse.
const BLOCKED_PATTERN = /(ne fonctionne pas|n'a aucun effet|ne peut pas (?:vous |le |la |les )?affecter|ne peuvent pas (?:vous |le |la |les )?affecter)/i;
function hasNamedPower(desc) {
  return /\bpouvoir\s+[A-ZÀ-Ý]/.test(desc || '');
}
function simplifyInteraction(c, other, term, mySnippet, otherSnippet) {
  const bareTerm = term.replace(/[«»]/g, '').trim();
  // Cas 1 : le pouvoir de L'AUTRE rôle est bloqué par MON attribut → je suis protégé.
  if (hasNamedPower(other.desc) && otherSnippet && BLOCKED_PATTERN.test(otherSnippet)) {
    return 'Son pouvoir ne fonctionne pas sur toi (tu as l\u2019attribut « ' + bareTerm + ' »).';
  }
  // Cas 2 : MON pouvoir (celui du rôle affiché) est bloqué par l'attribut de L'AUTRE.
  if (hasNamedPower(c.desc) && mySnippet && BLOCKED_PATTERN.test(mySnippet)) {
    return 'Ton pouvoir ne fonctionne pas sur ' + other.name + ' (attribut « ' + bareTerm + ' »).';
  }
  // Cas par défaut : on ne sait pas déterminer un sens clair, phrase officielle de l'autre.
  return otherSnippet;
}

// De nombreux rôles ont une remarque du type "les attributs « X » et « Y » s'annulent"
// pour un attribut Y qu'ils ne possèdent PAS eux-mêmes (ex. Despote nucléaire a
// « imprudent » et sa remarque cite « timide » juste pour dire qu'ils s'annulent s'ils
// se rencontrent — Despote nucléaire n'a pas « timide »). Sans filtrage, ce mot suffit
// à le faire matcher à tort avec des rôles réagissant à « timide » (ex. Agent). On retire
// donc ces phrases avant de déterminer quels attributs un rôle a vraiment.
function stripCancellationRemarks(text) {
  if (!text) return text;
  return text.split(/\n\n|(?<=[.!?])\s+(?=[A-ZÀ-Ý])/).filter(s => !/s'annulent/i.test(s)).join(' ');
}

function computeSquadInteractions(c) {
  const squadIds = Object.keys(state.squad).filter(id => state.squad[id]);
  if (!squadIds.length) return [];
  const myText = stripCancellationRemarks([c.desc, c.plus, c.minus].filter(Boolean).join(' '));
  const myTerms = findGlossaryMatches(myText).filter(g => INTERACTION_TERMS.includes(g.term));
  if (!myTerms.length) return [];
  const excludeIds = new Set([c.id, ...linkedMates(c.id)].filter(Boolean));
  const results = [];
  const seen = new Set();
  myTerms.forEach(g => {
    const mySnippet = findSentenceWithTerm(myText, g.match);
    squadIds.forEach(otherId => {
      if (excludeIds.has(otherId)) return;
      const other = CHAR_BY_ID[otherId];
      if (!other || isDisplayDuplicate(other.id)) return;
      const otherText = stripCancellationRemarks([other.desc, other.plus, other.minus].filter(Boolean).join(' '));
      const otherSnippet = findSentenceWithTerm(otherText, g.match);
      const key = other.id + '|' + g.term;
      if (otherSnippet && !seen.has(key)) {
        seen.add(key);
        results.push({ term: g.term, name: other.name, snippet: simplifyInteraction(c, other, g.term, mySnippet, otherSnippet) });
      }
    });
  });
  return results;
}

function openRoleDetail(id, mode) {
  mode = mode || 'build'; // 'build' = onglet Rôles (avec conseils + ajout/retrait) ; 'explain' = en cours de partie (épuré au maximum)
  const c = CHAR_BY_ID[id];
  if (!c) return;
  const mixte = isMixteRole(c);
  const modal = document.getElementById('modal');
  const body = document.getElementById('modal-body');
  body.innerHTML = '';
  const header = el('div', 'modal-header ' + (mixte ? 'team-bg-mixte' : 'team-bg-' + (c.guideColor || c.team)));
  header.appendChild(el('div', 'modal-title', c.name));

  if (mode === 'build') {
    // En composition, le MJ a besoin de tout le contexte pour construire une partie
    // équilibrée : association officielle, équipe, boîte d'origine.
    if (mixte) {
      header.appendChild(el('div', 'modal-subtitle', 'Existe en 2 exemplaires (bleu et rouge), règle identique.'));
    } else if (c.pairName) {
      header.appendChild(el('div', 'modal-subtitle', 'Associé : ' + c.pairName + (c.linked ? ' (personnages liés)' : '')));
    }
    header.appendChild(el('div', 'modal-team', mixte ? 'Équipe bleue & Équipe rouge' : TEAM_LABEL[c.guideColor || c.team]));
  }
  body.appendChild(header);

  // Explication rapide : LA chose que le joueur doit lire.
  body.appendChild(el('div', 'quick-explain', c.quick));

  // Interactions avec les autres rôles déjà sélectionnés : une ligne par interaction,
  // avec la phrase officielle qui explique CE QUI SE PASSE concrètement (pas juste
  // "aussi chez X", qui ne dit rien d'actionnable). Les définitions de jargon isolées
  // ne sont plus montrées ici : le bouton Lexique reste l'endroit pour ça.
  const interactions = computeSquadInteractions(c);
  if (interactions.length) {
    const interBox = el('div', 'glossary-box');
    interactions.forEach(it => {
      const line = el('div', 'glossary-line');
      line.appendChild(el('span', 'glossary-term', '🔗 ' + it.name + ' : '));
      line.appendChild(el('span', 'glossary-def', it.snippet));
      interBox.appendChild(line);
    });
    body.appendChild(interBox);
  }

  if (mode === 'explain') {
    if (c.desc) {
      // Le texte officiel reste visible d'emblée (pas de clic requis), mais en
      // petit et discret : la phrase simple ci-dessus suffit dans l'immense
      // majorité des cas, celui-ci n'est là que pour le joueur qui veut vérifier
      // un détail précis, sans obligation de le lire.
      const officialLabel = el('div', 'official-label', 'Texte officiel complet');
      body.appendChild(officialLabel);
      const descWrap = el('div', 'modal-desc official-desc');
      c.desc.split('\n\n').forEach(p => descWrap.appendChild(el('p', null, p)));
      body.appendChild(descWrap);
    }
    modal.classList.add('open');
    return;
  }

  // --- À partir d'ici : mode "build" (composition de la partie) ---

  // Les conseils +/- (recommandations de composition) n'ont de sens qu'au moment
  // de composer la partie : inutiles — et distrayants — une fois la partie lancée.
  if (c.plus) {
    const p = el('div', 'tip tip-plus');
    p.textContent = '➕ ' + c.plus;
    body.appendChild(p);
  }
  if (c.minus) {
    const m = el('div', 'tip tip-minus');
    m.textContent = '➖ ' + c.minus;
    body.appendChild(m);
  }

  // Texte officiel complet, replié par défaut : utile si un joueur chipote sur un cas précis.
  const details = document.createElement('details');
  details.className = 'detail-toggle';
  const summary = document.createElement('summary');
  summary.textContent = 'Voir le texte officiel complet';
  details.appendChild(summary);
  const descWrap = el('div', 'modal-desc');
  c.desc.split('\n\n').forEach(p => descWrap.appendChild(el('p', null, p)));
  details.appendChild(descWrap);
  body.appendChild(details);

  const mateCount = linkedMates(c.id).length;
  const addSuffix = mateCount > 1 ? ' (avec les rôles liés)' : (mateCount === 1 ? ' (avec son binôme)' : '');
  const toggleBtn = el('button', 'btn btn-primary modal-toggle',
    state.squad[c.id] ? 'Retirer de la partie' : ('Ajouter à la partie' + addSuffix));
  toggleBtn.addEventListener('click', () => {
    setSquadMembership(c.id, !state.squad[c.id]);
    closeModal();
    refreshCurrentTab();
  });
  body.appendChild(toggleBtn);

  modal.classList.add('open');
}

function refreshCurrentTab() {
  if (currentTab === 'salles') renderSalles();
  else if (currentTab === 'roles') renderRoles();
  else if (currentTab === 'explication') renderExplication();
  else if (currentTab === 'minuteur') renderMinuteur();
  else if (currentTab === 'finpartie') renderFinPartie();
}

// Lexique : par défaut, ne montre que les termes utiles aux rôles actuellement
// en jeu (détection automatique). Un bouton permet d'accéder à tout le lexique
// au cas où (rôle mal détecté, etc.).
function openGlossary(forceFull) {
  const modal = document.getElementById('modal');
  const body = document.getElementById('modal-body');
  body.innerHTML = '';

  const squadIds = Object.keys(state.squad).filter(id => state.squad[id]);
  let listToShow = GLOSSARY;
  let subtitle = 'Tous les termes de base du jeu.';
  let showFullBtn = false;

  if (!forceFull && squadIds.length) {
    const combined = squadIds.map(id => {
      const cc = CHAR_BY_ID[id];
      return cc ? stripCancellationRemarks([cc.desc, cc.plus, cc.minus].filter(Boolean).join(' ')) : '';
    }).join(' ');
    const relevant = findGlossaryMatches(combined);
    if (relevant.length) {
      listToShow = relevant;
      subtitle = 'Termes utiles pour les rôles actuellement en jeu.';
      showFullBtn = true;
    }
  } else if (!forceFull && !squadIds.length) {
    subtitle = 'Aucun rôle sélectionné pour l\u2019instant : voici tous les termes de base.';
  }

  const header = el('div', 'modal-header');
  header.appendChild(el('div', 'modal-title', '📖 Lexique'));
  header.appendChild(el('div', 'modal-subtitle', subtitle));
  body.appendChild(header);
  const glossBox = el('div', 'glossary-box');
  listToShow.forEach(g => {
    const line = el('div', 'glossary-line');
    line.appendChild(el('span', 'glossary-term', g.term + ' : '));
    line.appendChild(el('span', 'glossary-def', g.def));
    glossBox.appendChild(line);
  });
  body.appendChild(glossBox);
  if (showFullBtn) {
    const fullBtn = el('button', 'btn btn-ghost btn-sm modal-toggle', 'Voir tout le lexique, au cas où');
    fullBtn.addEventListener('click', () => openGlossary(true));
    body.appendChild(fullBtn);
  }
  modal.classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

      nameLine.appendChild(el('span', 'explain-name', c.name + nameSuffix));

        row.appendChild(descWrap);

function computeEndgamePrompts(squadIds) {
  const present = new Set(squadIds);
  const matches = ENDGAME_PROMPTS.filter(p => p.ids.every(id => present.has(id)));
  const avant = matches.filter(p => p.phase === 'avant').sort((a, b) => a.order - b.order);
  const pendant = matches.filter(p => p.phase === 'pendant');
  const apres = matches.filter(p => p.phase === 'apres').sort((a, b) => a.order - b.order);
  return { avant, pendant, apres };
}

// ONGLET 3 — MINUTEUR
// ============================================================
let timerInterval = null;
let audioCtx = null;
let wakeLock = null;

// Empêche le téléphone de verrouiller son écran pendant qu'une manche tourne (posé sur
// la table, visible par tous). Ne fonctionne que sur navigateur compatible (iOS 16.4+,
// Chrome Android récents) — échoue silencieusement sinon, sans bloquer le minuteur.
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    }
  } catch (e) { /* pas grave si indisponible : le minuteur continue de tourner */ }
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
}
// Si l'onglet redevient visible (l'utilisateur avait changé d'appli) pendant qu'une
// manche tourne encore, on retente d'acquérir le verrou (il est perdu automatiquement
// quand l'onglet passe en arrière-plan sur certains navigateurs).
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && state.timer && state.timer.phase === 'running') {
    requestWakeLock();
  }
});

function beep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = 'sine'; o.frequency.value = 880;
    g.gain.setValueAtTime(0.001, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.3, audioCtx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
    o.start(); o.stop(audioCtx.currentTime + 0.55);
  } catch (e) { /* ignore */ }
  if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
}

function ensureRounds() {
  const t = state.timer;
  if (!t.rounds || !t.rounds.length) {
    const n = currentTargetPlayers();
    const mode = t.mode === 'simple' ? 'simple' : (t.mode === 'avance' ? 'avance' : (n <= 10 ? 'simple' : 'avance'));
    t.rounds = getDefaultRounds(n, mode);
    t.currentIndex = 0;
    t.remaining = t.rounds[0].duration;
    t.phase = 'idle';
    t.lastN = n;
  }
}

// Panneau "rôles en jeu", accessible en permanence depuis le minuteur : un joueur
// vient poser une question sur son rôle pendant une manche -> le MJ clique dessus.
function renderRolesInPlayPanel() {
  const squadIds = Object.keys(state.squad).filter(id => state.squad[id]);
  const displayIds = squadIds.filter(id => !isDisplayDuplicate(id));
  const box = el('div', 'card roles-in-play');
  const headRow = el('div', 'card-head-row');
  headRow.appendChild(el('h2', null, 'Rôles en jeu (' + displayIds.length + ')'));
  const lexBtn = el('button', 'btn btn-ghost btn-sm', '📖 Lexique');
  lexBtn.addEventListener('click', () => openGlossary());
  headRow.appendChild(lexBtn);
  box.appendChild(headRow);

  if (!squadIds.length) {
    box.appendChild(el('p', 'muted', 'Aucun rôle sélectionné. Va dans l\u2019onglet Rôles pour composer la partie.'));
    return box;
  }
  box.appendChild(el('p', 'muted small-note', 'Un joueur a une question sur son rôle ? Touche-le ci-dessous.'));
  const wrap = el('div', 'chosen-wrap');
  displayIds.slice().sort((a, b) => CHAR_BY_ID[a].name.localeCompare(CHAR_BY_ID[b].name, 'fr')).forEach(id => {
    const c = CHAR_BY_ID[id];
    if (!c) return;
    const tag = el('span', 'chosen-tag team-' + (isMixteRole(c) ? 'mixte' : c.team) + ' tappable');

    tag.addEventListener('click', () => openRoleDetail(id, 'explain'));
    wrap.appendChild(tag);
  });
  box.appendChild(wrap);
  return box;
}

function renderMinuteur() {
  ensureRounds();
  const root = document.getElementById('view-minuteur');
  root.innerHTML = '';
  const t = state.timer;
  root.appendChild(renderRolesInPlayPanel());

  // --- Réglages (visibles seulement si pas en cours) ---
  if (t.phase === 'idle') {
    const setupBox = el('div', 'card');
    setupBox.appendChild(el('h2', null, 'Réglages de la partie'));

    const row = el('div', 'row-input wrap');
    row.appendChild(playerCountChip());

    const modeSelect = el('select', 'text-input');
    [['auto', 'Automatique (selon nb joueurs)'], ['simple', 'Mode simple (3 manches)'], ['avance', 'Mode avancé (5 manches)']].forEach(([v, l]) => {
      const o = el('option', null, l); o.value = v; if (t.mode === v) o.selected = true;
      modeSelect.appendChild(o);
    });

    const regenBtn = el('button', 'btn btn-primary', 'Régénérer les manches');
    regenBtn.addEventListener('click', () => {
      const n = currentTargetPlayers();
      state.targetPlayers = n;
      t.mode = modeSelect.value;
      const mode = t.mode === 'auto' ? (n <= 10 ? 'simple' : 'avance') : t.mode;
      t.rounds = getDefaultRounds(n, mode);
      t.currentIndex = 0;
      t.remaining = t.rounds[0].duration;
      t.lastN = n;
      saveState();
      renderMinuteur();
    });

    row.appendChild(modeSelect);
    row.appendChild(regenBtn);
    setupBox.appendChild(row);

    if (t.lastN && t.lastN !== currentTargetPlayers()) {
      setupBox.appendChild(el('p', 'warning-text',
        '⚠️ Ces manches ont été générées pour ' + t.lastN + ' joueur' + (t.lastN > 1 ? 's' : '') +
        ', mais l\u2019onglet Salles en compte ' + currentTargetPlayers() + ' maintenant. Appuie sur « Régénérer les manches » si besoin.'));
    }

    // Le livret ne définit le nombre d'otages du mode simple (3 manches) que pour un
    // effectif de 10 joueurs ou moins ; au-delà, ces valeurs sont une extrapolation de
    // l'appli, pas une règle officielle telle quelle.
    if (t.mode === 'simple' && currentTargetPlayers() > 10) {
      setupBox.appendChild(el('p', 'warning-text',
        '⚠️ Le mode simple (3 manches) n\u2019est officiellement prévu que jusqu\u2019à 10 joueurs. Au-delà, le nombre d\u2019otages par manche est une extrapolation de l\u2019appli, pas une valeur du livret — le mode avancé (5 manches) est recommandé pour ' + currentTargetPlayers() + ' joueurs.'));
    }

    // Tableau des manches, éditable
    const table = el('div', 'rounds-table');
    const head = el('div', 'rounds-row rounds-head');
    head.appendChild(el('div', null, 'Manche'));
    head.appendChild(el('div', null, 'Durée'));
    head.appendChild(el('div', null, 'Otages / salle'));
    head.appendChild(el('div', null, ''));
    table.appendChild(head);

    t.rounds.forEach((r, i) => {
      const row2 = el('div', 'rounds-row' + (r.estimated ? ' estimated' : ''));
      row2.appendChild(el('div', 'rounds-label', 'Manche ' + (i + 1)));

      row2.appendChild(stepperControl(r.duration / 60, {
        size: 'mini', min: 0.5, step: 0.5, label: 'Durée de la manche ' + (i + 1),
        format: (v) => (v % 1 === 0 ? v.toFixed(0) : v.toFixed(1).replace('.', ',')) + ' min',
        onChange: (v) => { r.duration = Math.round(v * 60); saveState(); renderMinuteur(); }
      }));

      row2.appendChild(stepperControl(r.hostages, {
        size: 'mini', min: 0, step: 1, label: 'Otages de la manche ' + (i + 1),
        onChange: (v) => { r.hostages = v; saveState(); renderMinuteur(); }
      }));

      const delBtn = el('button', 'icon-btn', '✕');
      delBtn.addEventListener('click', () => { t.rounds.splice(i, 1); saveState(); renderMinuteur(); });
      row2.appendChild(delBtn);

      table.appendChild(row2);
    });
    setupBox.appendChild(table);

    const addRoundBtn = el('button', 'btn btn-ghost btn-sm', '+ Ajouter une manche');
    addRoundBtn.addEventListener('click', () => {
      t.rounds.push({ duration: 60, hostages: 1 });
      saveState(); renderMinuteur();
    });
    setupBox.appendChild(addRoundBtn);

    root.appendChild(setupBox);

    const startBox = el('div', 'card center-card');
    const startBtn = el('button', 'btn btn-start', '▶ Démarrer la partie');
    startBtn.addEventListener('click', () => {
      t.currentIndex = 0;
      t.remaining = t.rounds[0].duration;
      t.phase = 'running';
      saveState();
      startTicking();
      renderMinuteur();
    });
    startBox.appendChild(startBtn);
    root.appendChild(startBox);
    return;
  }

  // --- Affichage en cours de partie ---
  const gameBox = el('div', 'card timer-card');

  if (t.phase === 'finished') {
    gameBox.appendChild(el('div', 'timer-phase-label', 'Partie terminée'));
    gameBox.appendChild(el('div', 'timer-final', '🎉 Dernier échange effectué'));
    gameBox.appendChild(el('p', 'muted', 'Chaque joueur révèle sa carte. Si le Poseur de bombe est avec le Président : Équipe rouge. Sinon : Équipe bleue.'));
    const restart = el('button', 'btn btn-primary', 'Nouvelle partie');
    restart.addEventListener('click', () => {
      t.phase = 'idle'; t.rounds = null; ensureRounds();
      saveState(); renderMinuteur();
    });
    gameBox.appendChild(restart);
    root.appendChild(gameBox);
    return;
  }

  const round = t.rounds[t.currentIndex];
  const progress = el('div', 'muted', 'Manche ' + (t.currentIndex + 1) + ' / ' + t.rounds.length + (round.estimated ? '  (durée estimée)' : ''));
  gameBox.appendChild(progress);

  if (t.phase === 'exchange') {
    gameBox.appendChild(el('div', 'timer-phase-label', 'Phase d\u2019échange d\u2019otages'));
    gameBox.appendChild(el('div', 'exchange-count', round.hostages + ' otage' + (round.hostages > 1 ? 's' : '') + ' par salle'));
    gameBox.appendChild(el('p', 'muted', 'Les leaders se retrouvent dans le couloir, échangent les otages, puis chacun retourne dans sa salle.'));
    const nextBtn = el('button', 'btn btn-start', t.currentIndex + 1 < t.rounds.length ? '▶ Démarrer la manche suivante' : '🏁 Terminer la partie');
    nextBtn.addEventListener('click', () => {
      if (t.currentIndex + 1 < t.rounds.length) {
        t.currentIndex += 1;
        t.remaining = t.rounds[t.currentIndex].duration;
        t.phase = 'running';
        startTicking();
      } else {
        t.phase = 'finished';
        stopTicking();
      }
      saveState();
      renderMinuteur();
    });
    gameBox.appendChild(nextBtn);
  } else {
    gameBox.appendChild(el('div', 'timer-display', fmtTime(t.remaining)));
    const controls = el('div', 'timer-controls');
    if (t.phase === 'running') {
      const pauseBtn = el('button', 'btn btn-secondary', '⏸ Pause');
      pauseBtn.addEventListener('click', () => { t.phase = 'paused'; stopTicking(); saveState(); renderMinuteur(); });
      controls.appendChild(pauseBtn);
    } else if (t.phase === 'paused') {
      const resumeBtn = el('button', 'btn btn-secondary', '▶ Reprendre');
      resumeBtn.addEventListener('click', () => { t.phase = 'running'; startTicking(); saveState(); renderMinuteur(); });
      controls.appendChild(resumeBtn);
    }
    const skipBtn = el('button', 'btn btn-ghost', '⏭ Fin de manche');
    skipBtn.addEventListener('click', () => { endRound(); });
    controls.appendChild(skipBtn);
    gameBox.appendChild(controls);
  }

  const stopBox = el('button', 'btn btn-ghost btn-sm danger', 'Arrêter / réinitialiser la partie');
  stopBox.addEventListener('click', () => {
    showConfirm('Arrêter le minuteur et revenir aux réglages ?', () => {
      stopTicking();
      t.phase = 'idle'; t.rounds = null; ensureRounds();
      saveState(); renderMinuteur();
    });
  });
  gameBox.appendChild(stopBox);

  root.appendChild(gameBox);
}

function startTicking() {
  stopTicking();
  requestWakeLock();
  const t = state.timer;
  // Horodatage de fin absolu plutôt que décrémentation seconde par seconde : si le
  // navigateur ralentit l'onglet (arrière-plan, économie d'énergie), le compte à
  // rebours affiché ne dérive pas, il se recale sur l'heure réelle à chaque tick.
  t.endAt = Date.now() + t.remaining * 1000;
  saveState();
  timerInterval = setInterval(() => {
    const t = state.timer;
    if (t.phase !== 'running') return;
    const remaining = Math.round((t.endAt - Date.now()) / 1000);
    if (remaining <= 0) {
      t.remaining = 0;
      endRound();
      return;
    }
    t.remaining = remaining;
    updateTimerDisplayOnly();
    saveState();
  }, 1000);
}

function stopTicking() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  releaseWakeLock();
}

function endRound() {
  const t = state.timer;
  stopTicking();
  beep();
  t.phase = 'exchange';
  saveState();
  renderMinuteur();
}

// Met à jour uniquement le chiffre du minuteur sans tout re-render (perf/évite clignotement)
function updateTimerDisplayOnly() {
  const disp = document.querySelector('.timer-display');
  if (disp) disp.textContent = fmtTime(state.timer.remaining);
  updateTimerBadge();
}

// Pastille visible en permanence dans l'en-tête, quel que soit l'onglet ouvert : évite
// d'oublier qu'une manche tourne (ou est en pause) parce qu'on consulte un autre onglet
// (ex. Explication) pendant le décompte. Un tap ramène directement au Minuteur.
function updateTimerBadge() {
  const badge = document.getElementById('timer-badge');
  if (!badge) return;
  const t = state.timer;
  if (!t || t.phase === 'idle' || t.phase === 'finished') {
    badge.style.display = 'none';
    badge.classList.remove('paused');
    return;
  }
  let label;
  if (t.phase === 'exchange') {
    label = '🔄 Échange d\u2019otages en cours — toucher pour continuer';
  } else if (t.phase === 'paused') {
    label = '⏸ Manche ' + (t.currentIndex + 1) + '/' + t.rounds.length + ' en pause — ' + fmtTime(t.remaining);
  } else {
    label = '⏱️ Manche ' + (t.currentIndex + 1) + '/' + t.rounds.length + ' — ' + fmtTime(t.remaining);
  }
  badge.textContent = label;
  badge.classList.toggle('paused', t.phase === 'paused');
  badge.style.display = 'flex';
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
  document.getElementById('modal-close').addEventListener('click', () => { closeModal(); refreshCurrentTab(); });
  document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target.id === 'modal') { closeModal(); refreshCurrentTab(); }
  });
  document.getElementById('new-game-btn').addEventListener('click', startNewGame);
  document.getElementById('timer-badge').addEventListener('click', () => switchTab('minuteur'));
  ensureRounds();
  // Si une manche était en cours au moment de la fermeture, on repart en pause pour éviter les dérives de temps.
  if (state.timer.phase === 'running') state.timer.phase = 'paused';
  switchTab('salles');
  updateTimerBadge();
});

</script>
